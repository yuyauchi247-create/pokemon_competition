# 本番用 compose（AWS Lightsail VPS / 常時稼働）
#
# ローカル開発用の compose.yaml とは別物。本番は Caddy が 80/443 を受けて
# 自動 HTTPS を張り、内部ネットワークで webapp:5000 へリバースプロキシする。
#
# 起動(リポジトリのルートで実行):
#   docker compose -f compose.prod.yaml up -d --build
services:
  webapp:
    build: .
    # 配布 libcg.so が Linux x86-64 専用のため amd64 を強制
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POKECA_WEBAPP_HOST: "0.0.0.0"
      POKECA_WEBAPP_PORT: "5000"
      # 注意: AIコードのアップロードは exec を伴い RCE リスクがある。
      # 本番は Basic 認証(Caddy)で保護される前提で、ユーザー判断により有効化している。
      # 信頼できる相手にのみ Basic 認証情報を渡すこと。無効化する場合は "0" に戻す。
      POKECA_ALLOW_AGENT_UPLOAD: "1"
    # libcg.so は ctypes のプロセスグローバル状態を使うため並行実行は不可。
    # 1 worker / 1 thread で全リクエストを直列化する。
    # 総当たり戦は1リクエストで長時間かかるため timeout を長めに取る。
    command:
      - gunicorn
      - --chdir
      - tools/webapp
      - --workers
      - "1"
      - --threads
      - "1"
      - --timeout
      - "1800"
      - --graceful-timeout
      - "30"
      - --bind
      - "0.0.0.0:5000"
      - server:app
    volumes:
      # card_images はイメージに焼かず読み取り専用でマウント（.dockerignore で除外済み）
      - ./data/card_images:/app/data/card_images:ro
      - ./data/user_decks:/app/data/user_decks
      - ./data/user_agents:/app/data/user_agents
      - ./data/logs:/app/data/logs
    # ホストにはポートを公開しない（Caddy 経由のみアクセス可能）
    expose:
      - "5000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    # Basic 認証の資格情報（BASIC_AUTH_USER / BASIC_AUTH_HASH）を注入。
    # このファイルは git 管理外で VPS 上にのみ存在する。無ければ Caddy は起動しない
    # ため、本番では必ず /opt/pokeca/.env.caddy を用意すること。
    env_file:
      - ./.env.caddy
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - webapp

volumes:
  caddy_data:
  caddy_config:
