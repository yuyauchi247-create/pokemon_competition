{% extends "base.html" %}
{% block title %}オンライン対戦に参加 | ポケカ{% endblock %}

{% block content %}
<div class="setup">
  <form id="joinForm" class="hero">
    <h2>オンライン対戦に参加</h2>
    <p>招待された対戦に、あなたのデッキで参加します。</p>
    <div id="roomInfo" class="hint" style="margin-bottom:10px"></div>
    <div class="choice">
      <h3>ニックネーム</h3>
      <input type="text" name="nickname" maxlength="20" placeholder="対戦相手に表示される名前（例: はなこ）"
             style="border:1px solid var(--line);border-radius:10px;padding:9px;width:100%;max-width:320px">
      <small style="display:block;color:var(--sub);margin-top:4px">相手にはこのニックネームのみ表示され、使用デッキは知られません。</small>
    </div>
    <div class="choice">
      <h3>あなたのデッキ</h3>
      <label><input type="radio" name="deck_mode" value="user" checked> 保存済みデッキから選ぶ</label>
      <div id="userDeckTiles" class="deckTiles"></div>
      <div id="userDeckDetail" class="deckDetail"></div>
      <label style="margin-top:14px"><input type="radio" name="deck_mode" value="agent"> 登録AIのデッキを使う</label>
      <select id="agentDeckSel" name="deck_agent_id" style="margin-left:24px"></select>
      <label style="margin-top:14px"><input type="radio" name="deck_mode" value="custom"> オリジナルデッキCSVをアップロード</label>
      <input id="deckFile" type="file" name="deck_file" accept=".csv,text/csv">
      <input type="hidden" name="deck_id" id="deckIdField">
      <input type="hidden" name="user_deck_id" id="userDeckIdField">
      <input type="hidden" name="deck_password" id="jDeckPw">
    </div>
    <button id="joinBtn" type="submit">この設定で参加</button>
    <div id="joinMsg" style="margin-top:10px;color:#e0556b;font-weight:700;white-space:pre-wrap"></div>
  </form>
</div>
{% endblock %}

{% block script %}
<script>
const GID=new URLSearchParams(location.search).get('gid')||'';
function jmsg(m=''){document.getElementById('joinMsg').textContent=m;}
let USER_DECKS=[];
function jCardsHtml(cards){
  return '<div class="deckCards">'+(cards||[]).map(c=>`<div class="miniCard" data-cid="${c.id}" title="${c.name||''}×${c.count}（クリックで詳細）">${c.img?`<img src="${c.img}" loading="lazy" alt="">`:`<div class="ph">${c.name||''}</div>`}<div class="cnt">×${c.count}</div></div>`).join('')+'</div>';
}
function jShowCards(cards){
  const d=document.getElementById('userDeckDetail'); d.innerHTML=jCardsHtml(cards);
  const els=[...d.querySelectorAll('.miniCard[data-cid]')]; const list=els.map(e=>+e.dataset.cid);
  els.forEach((el,i)=>el.onclick=()=>showCardDetail(+el.dataset.cid,list,i));
}
function selectUserDeck(deck){
  if(!deck||deck.hasBasic===false)return;
  document.getElementById('userDeckIdField').value=deck.id;
  document.getElementById('jDeckPw').value='';
  const r=document.querySelector('input[name="deck_mode"][value="user"]'); if(r)r.checked=true;
  document.querySelectorAll('#userDeckTiles .deckTile').forEach(t=>t.classList.toggle('sel',t.dataset.id===String(deck.id)));
  const det=document.getElementById('userDeckDetail');
  if(deck.private){
    det.innerHTML=`<div class="pwrow">🔒 非公開デッキ <input type="password" class="dkpw" placeholder="パスワード"><button type="button" class="gray unlockBtn">表示</button><span class="pwmsg hint"></span></div>`;
    const inp=det.querySelector('.dkpw'),msg=det.querySelector('.pwmsg');
    det.querySelector('.unlockBtn').onclick=async()=>{
      const res=await post('/api/decks/'+encodeURIComponent(deck.id)+'/unlock',{password:inp.value});
      if(res.error){msg.textContent=res.error;return;}
      document.getElementById('jDeckPw').value=inp.value; jShowCards(res.cards);
    };
  }else{ jShowCards(deck.cards||[]); }
}
function renderUserDeckTiles(decks){
  USER_DECKS=decks||[];
  const box=document.getElementById('userDeckTiles');
  if(!USER_DECKS.length){box.innerHTML='<small>デッキがまだありません。</small>';return;}
  box.innerHTML=USER_DECKS.map(d=>{const dis=d.hasBasic===false;
    return `<div class="deckTile${dis?' disabled':''}" data-id="${d.id}">${d.private?'<span class="lock">🔒</span>':''}<div class="box">🃏</div><div class="dknm">${d.name}${dis?'<br><small>⚠たね無し</small>':''}</div></div>`;}).join('');
  box.querySelectorAll('.deckTile').forEach(t=>{const d=USER_DECKS.find(x=>String(x.id)===t.dataset.id);t.onclick=()=>selectUserDeck(d);});
}

document.getElementById('joinForm').onsubmit=async e=>{
  e.preventDefault();
  if(!GID){jmsg('対戦IDが指定されていません。招待URLから開いてください。');return;}
  const fd=new FormData(e.currentTarget);
  const dm=fd.get('deck_mode');
  if(dm==='user'&&!fd.get('user_deck_id')){jmsg('保存済みデッキを選択してください。');return;}
  if(dm==='agent'&&!fd.get('deck_agent_id')){jmsg('使用する登録AIのデッキを選択してください。');return;}
  if(dm==='custom'&&!document.getElementById('deckFile').files.length){jmsg('デッキCSVを選択してください。');return;}
  jmsg('参加中…');
  const r=await fetch('/api/join?gid='+encodeURIComponent(GID),{method:'POST',body:fd});
  const ns=await r.json();
  if(ns.error){jmsg(ns.error);return;}
  localStorage.setItem('pvp_token_'+ns.gid, ns.token);
  location.href='/battle?gid='+encodeURIComponent(ns.gid);
};

if(!GID){jmsg('対戦IDが指定されていません。招待URLから開いてください。');}
else{document.getElementById('roomInfo').textContent='対戦ID: '+GID;}
// 保存済みデッキを高速取得して先に表示（/api/config は登録AIプレビューが重い）。
get('/api/decks').then(c=>{
  renderUserDeckTiles(c.userDecks||[]);
}).catch(()=>{document.getElementById('userDeckTiles').innerHTML='<small>デッキの読み込みに失敗しました。再読み込みしてください。</small>';});
// 登録AIのデッキ選択肢は別途取得。
get('/api/config').then(c=>{
  const deckAgents=(c.agents||[]).filter(a=>a.cards&&a.cards.length);
  const sel=document.getElementById('agentDeckSel');
  sel.innerHTML=deckAgents.length?deckAgents.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')
    :'<option value="">（デッキを持つ登録AIがありません）</option>';
  sel.addEventListener('focus',()=>{const r=document.querySelector('input[name="deck_mode"][value="agent"]');if(r)r.checked=true;});
}).catch(()=>{});
</script>
{% endblock %}
