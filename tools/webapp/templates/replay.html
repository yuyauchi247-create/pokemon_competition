{% extends "base.html" %}
{% block title %}対戦ログ（リプレイ） | ポケカ{% endblock %}

{% block nav %}
<button type="button" class="gray" onclick="location.href='/'">ホームへ</button>
{% endblock %}

{% block head %}
<style>
  .replayWrap{display:grid;grid-template-columns:300px 1fr;gap:14px;max-width:1320px;margin:14px auto;padding:0 14px;align-items:start;}
  .replayWrap>div{min-width:0;}  /* Kaggle盤面(固定750px)を列内スクロールに収める */
  @media(max-width:980px){.replayWrap{grid-template-columns:1fr;}}
  .logListPanel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:0 4px 18px #0b346b0a;max-height:80vh;overflow:auto;}
  .logListPanel h3{margin:0 0 10px;font-size:14px;color:var(--teal);}
  .logItem{border:1px solid var(--line);border-radius:10px;padding:9px 10px;margin-bottom:8px;cursor:pointer;background:#fbfdff;font-size:12px;}
  .logItem:hover{background:#f1f7ff;}
  .logItem.sel{border-color:var(--teal);box-shadow:0 0 0 2px #0ea5b755;}
  .logItem .vs{font-weight:800;color:var(--ink);font-size:13px;line-height:1.3;cursor:pointer;}
  .logItem .meta{color:var(--sub);margin-top:3px;cursor:pointer;}
  .logItem .logTop{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .logItem .logChk{width:16px;height:16px;cursor:pointer;}
  .logItem .dlOne{text-decoration:none;font-size:15px;color:var(--teal);padding:0 4px;border-radius:6px;}
  .logItem .dlOne:hover{background:#e3f5f8;}
  /* フィルタ＆ダウンロードパネル */
  .logFilters{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;padding:10px;border:1px solid var(--line);border-radius:12px;background:#fbfdff;}
  .logFilters input[type=search],.logFilters input[type=date]{border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:12px;}
  .logFilters .fltRow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--sub);}
  .logFilters .fltRow label{font-weight:700;color:#46566b;}
  .logFilters #dlSelected{font-size:12px;padding:8px 10px;}
  .logFilters #dlSelected:disabled{opacity:.5;pointer-events:none;}
  .dlProgress{display:flex;align-items:center;gap:8px;margin-top:4px;}
  .dlProgress.hidden{display:none;}
  .dlProgress .bar{flex:1;height:10px;border-radius:6px;background:#e3ecf5;overflow:hidden;}
  .dlProgress .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#0ea5b7,#2bd07a);transition:width .12s;}
  .dlProgress .pct{font-size:11px;color:var(--sub);font-weight:700;min-width:48px;text-align:right;}
  .repMeta{font-weight:800;color:var(--ink);margin-bottom:8px;}
  .repControls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);
    border-left:4px solid var(--teal);border-radius:14px;padding:12px;margin-top:12px;box-shadow:0 4px 18px #0b346b0a;}
  .repControls input[type=range]{flex:1;min-width:140px;}
  .repControls .spd2{background:#eaf0f7;color:#46566b;box-shadow:none;padding:6px 10px;}
  .repControls .spd2.on{background:var(--blue);color:#fff;}
  .repLog{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;margin-top:12px;height:200px;display:flex;flex-direction:column;}
  .repLog h2{margin:0 0 8px;font-size:12px;color:var(--sub);}
  #repLogBody{overflow-y:auto;flex:1;font-size:12px;line-height:1.5;}
  /* プレイマット（battle と同じ見た目） */
  .playmat{--bcard:74px;position:relative;display:grid;
    grid-template-columns:minmax(118px,.85fr) minmax(0,2.2fr) minmax(118px,.85fr);grid-template-rows:auto auto auto;
    grid-template-areas:"oppside oppbench opppiles" "midl actives midr" "youside youbench youpiles";
    gap:10px;padding:16px;border-radius:22px;
    background:radial-gradient(circle at 50% 50%,rgba(14,165,183,.08),transparent 40%),linear-gradient(180deg,#eef6fc,#e7f0f8);
    border:1px solid #d3e0ec;box-shadow:inset 0 0 0 2px #ffffffcc,0 12px 34px #0b346b16;overflow:hidden;}
  .playmat::before{content:"";position:absolute;left:50%;top:50%;width:150px;height:150px;transform:translate(-50%,-50%);z-index:0;opacity:.4;
    border-radius:50%;border:9px solid #b9cbe0;background:linear-gradient(#0000 calc(50% - 5px),#b9cbe0 calc(50% - 5px) calc(50% + 5px),#0000 calc(50% + 5px));}
  .playmat>*{position:relative;z-index:1;min-width:0;}
  #oppSide{grid-area:oppside}#oppBench{grid-area:oppbench}#oppPiles{grid-area:opppiles}
  #actives{grid-area:actives}#youSide{grid-area:youside}#youBench{grid-area:youbench}#youPiles{grid-area:youpiles}
  .zone-bench{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;min-height:calc(var(--bcard)*1.45);border-radius:14px;padding:6px;}
  .zone-bench.you{background:#ffffff66;outline:1px dashed #bcd0e6;}
  .zone-actives{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
  .midline{font-weight:800;color:#9fb3c7;font-size:12px;letter-spacing:.18em;}
  .zone-side{display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;}
  .sblabel{font-size:11px;color:var(--sub);font-weight:700;margin-bottom:3px;text-align:center;}
  .prizegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
  .prizeback{width:20px;height:28px;border-radius:3px;background:linear-gradient(135deg,#5b8def,#274a9e);box-shadow:0 1px 3px #0b346b40;}
  .pile{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:56px;padding:7px 8px;border-radius:10px;background:#ffffffcc;border:1px solid var(--line);}
  .pile .pcount{font-size:16px;font-weight:800;color:var(--ink);}.pile .plabel{font-size:10px;color:var(--sub);font-weight:700;}
  .playmat .pcard{width:var(--bcard);}.playmat .pcard.imgcard{width:var(--bcard);}
  .zone-actives .pcard{width:calc(var(--bcard)*1.5);}
  .playmat .empty-c{width:var(--bcard);height:calc(var(--bcard)*1.36);font-size:10px;}
  .zone-actives .empty-c{width:calc(var(--bcard)*1.5);height:calc(var(--bcard)*1.5*1.36);}
  .handzone{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;margin-top:12px;}
  .handlabel{font-size:12px;color:var(--sub);font-weight:700;margin:0 0 8px;}
  .handlabel.opp{margin-top:12px;}
  /* ===== スマホ最適化 ===== */
  @media(max-width:640px){
    .replayWrap{padding:0 8px;gap:10px;}
    .logListPanel{max-height:40vh;}
    .playmat{--bcard:52px;padding:9px;gap:6px;
      grid-template-columns:minmax(58px,.7fr) minmax(0,2fr) minmax(58px,.7fr);}
    .playmat::before{width:108px;height:108px;border-width:7px;}
    .zone-bench{gap:5px;min-height:calc(var(--bcard)*1.4);}
    .pile{min-width:42px;padding:5px 6px;} .pile .pcount{font-size:14px;}
    .prizegrid{gap:2px;} .prizeback{width:15px;height:21px;}
    .midline{font-size:10px;letter-spacing:.1em;}
    .repControls{gap:8px;padding:10px;} .repLog{height:160px;}
  }
  @media(max-width:380px){
    .playmat{--bcard:46px;
      grid-template-columns:minmax(52px,.7fr) minmax(0,2fr) minmax(52px,.7fr);}
  }
</style>
{% endblock %}

{% block content %}
<div class="replayWrap">
  <aside class="logListPanel">
    <h3>対戦ログ一覧</h3>
    <div class="logFilters">
      <input type="search" id="fltText" placeholder="🔍 デッキ/AI名で絞り込み">
      <div class="fltRow"><label>期間</label>
        <input type="date" id="fltFrom"><span>〜</span><input type="date" id="fltTo"></div>
      <div class="fltRow">
        <label><input type="checkbox" id="fltSelectAll"> 表示中をすべて選択</label>
        <span class="hint" id="fltCount"></span>
      </div>
      <button type="button" id="dlSelected" disabled>⬇ 選択をZIPでダウンロード</button>
      <div class="dlProgress hidden" id="dlProgress"><div class="bar"><i></i></div><span class="pct"></span></div>
    </div>
    <div id="logList"><div class="hint">読み込み中…</div></div>
  </aside>
  <div>
    <div id="repMeta" class="repMeta">左の一覧から対戦を選んでください。</div>
    <!-- AI vs AI: Kaggle 公式ビジュアライザ（cabt）と同じ canvas 描画。
         盤面は Kaggle と同じ固定 750x700。狭い画面ではこの枠内だけ横スクロールする。 -->
    <div id="kvis" class="hidden" style="max-width:100%;overflow-x:auto;"></div>
    <section class="playmat" id="playmat">
      <div class="zone-side" id="oppSide"></div>
      <div class="zone-bench opp" id="oppBench"></div>
      <div class="zone-side" id="oppPiles"></div>
      <div class="zone-actives" id="actives">
        <div><div id="oppActive"></div></div>
        <div class="midline">VS</div>
        <div><div id="youActive"></div></div>
      </div>
      <div class="zone-side" id="youSide"></div>
      <div class="zone-bench you" id="youBench"></div>
      <div class="zone-side" id="youPiles"></div>
    </section>
    <div class="handzone">
      <div class="handlabel" id="oppHandLabel">相手の手札</div>
      <div class="row" id="oppHand"></div>
      <div class="handlabel you" id="youHandLabel">自分の手札</div>
      <div class="row" id="youHand"></div>
    </div>
    <div class="repControls" id="repControls"></div>
    <div class="repLog"><h2>対戦ログ</h2><div id="repLogBody"></div></div>
  </div>
</div>
{% endblock %}

{% block script %}
<script>
const ENE_ICON={GRASS:'🍃',FIRE:'🔥',WATER:'💧',LIGHTNING:'⚡',PSYCHIC:'🔮',FIGHTING:'👊',DARKNESS:'🌙',METAL:'⚙️',DRAGON:'🐉',COLORLESS:'⭐',RAINBOW:'🌈',TEAM_ROCKET:'🚀'};
let FRAMES=[], idx=0, playing=false, timer=null, spd=1, META=null;
let VISMODE=false, KVIS=[];   // AI vs AI: Kaggle 公式ビジュアライザ描画用

/* ---------- Kaggle 公式ビジュアライザ（cabt_renderer.ts の移植） ---------- */
const KV_ENERGY_TEXT='CGRWLPFDM A';
const KV_W=750, KV_H=700;
function escKv(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML;}
function kvPosY(index,len){
  const center=290;
  const height=(len<=8)?35*len:280;
  return center+(height*(2*index+1-len))/len;
}
function setVisMode(on){
  VISMODE=on;
  document.getElementById('kvis').classList.toggle('hidden',!on);
  document.getElementById('playmat').classList.toggle('hidden',on);
  document.querySelector('.handzone').classList.toggle('hidden',on);
  document.querySelector('.repLog').classList.toggle('hidden',on);
}
function kvOpenVisualizer(k){
  // Kaggle のレンダラーと同じ: visualize データを公式ビジュアライザへ POST する
  const players=[META.player0||'Player 0',META.player1||'Player 1'];
  for(const v of KVIS){
    for(let j=0;j<2;j++){
      try{v.current.players[j].ramainingTime=(v.obs&&v.obs.remainingOverageTime)??null;}catch(e){}
    }
  }
  KVIS[0].ps=players;
  const input=document.createElement('input');
  input.type='hidden';input.name='json';input.value=JSON.stringify(KVIS);
  const form=document.createElement('form');
  form.method='POST';
  form.action='https://ptcgvis.heroz.jp/Visualizer/Replay/'+k;
  form.target='_blank';
  form.appendChild(input);
  document.body.appendChild(form);form.submit();form.remove();
}
function renderKaggle(i){
  const parent=document.getElementById('kvis');
  const players=[META.player0||'Player 0',META.player1||'Player 1'];
  let canvas=parent.querySelector('canvas');
  if(!canvas){
    parent.innerHTML='';
    const inner=document.createElement('div');
    inner.style.cssText=`position:relative;width:${KV_W}px;height:${KV_H}px;margin:0 auto;`;
    parent.appendChild(inner);
    canvas=document.createElement('canvas');
    const pixelRatio=window.devicePixelRatio||1;
    canvas.width=KV_W*pixelRatio;canvas.height=KV_H*pixelRatio;
    canvas.style.width=KV_W+'px';canvas.style.height=KV_H+'px';
    inner.appendChild(canvas);
    canvas.getContext('2d').scale(pixelRatio,pixelRatio);
    for(let k=0;k<2;k++){
      const button=document.createElement('button');
      button.style.width='130px';button.style.height='50px';
      button.style.left=(k==0?'230px':'380px');button.style.top='55px';
      button.style.position='absolute';button.style.zIndex='1';
      // 長い登録名でもボタン外にあふれて盤面（勝者表示など）と重ならないようにする
      button.style.overflow='hidden';button.style.fontSize='11px';
      button.style.lineHeight='1.3';button.style.padding='2px 4px';
      button.style.whiteSpace='nowrap';button.style.textOverflow='ellipsis';
      button.innerHTML='Open Visualizer<br>'+escKv(players[k]);
      button.title=players[k];
      button.addEventListener('click',()=>kvOpenVisualizer(k));
      inner.appendChild(button);
    }
  }
  if(KVIS.length<=i)return;
  const state=KVIS[i].current;
  const ctx=canvas.getContext('2d');
  if(!ctx)return;
  // 配置・寸法は Kaggle 公式レンダラーのまま、配色だけアプリのライトテーマに合わせる
  ctx.fillStyle='#eef6fc';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#8fa6bd';ctx.fillStyle='#1c2340';ctx.lineWidth=2;
  ctx.font='20px sans-serif';
  // ターン数（visualize の観測から取得。ヘッダの「ターン n」表示も更新）
  const turnNo=(KVIS[i].obs&&KVIS[i].obs.current)?KVIS[i].obs.current.turn:null;
  if(turnNo!=null){
    ctx.fillText('Turn '+turnNo,20,32);
    const ti=document.getElementById('turnInfo');
    if(ti)ti.textContent=`ターン ${turnNo}`;
  }
  ctx.font='12px sans-serif';
  const drawCard=(x,y,card)=>{
    ctx.beginPath();ctx.rect(x,y,80,60);
    const f=ctx.fillStyle;ctx.fillStyle='#fff';ctx.fill();ctx.fillStyle=f;  // 重なっても読めるよう白地
    ctx.stroke();
    let nm=card.name,nm2=null;
    if(nm.length>=13){
      for(let t=0;t<nm.length;t++){if(nm[t]==' '){nm2=nm.substring(t+1);nm=nm.substring(0,t);break;}}
    }
    ctx.fillText(nm,x+5,y+13);
    if(nm2!=null)ctx.fillText(nm2,x+5,y+27);
  };
  const drawField=(x,y,card)=>{
    drawCard(x,y,card);
    ctx.fillText('HP '+card.hp,x+5,y+41);
    let energy='';
    for(const e of card.energies)energy=energy+KV_ENERGY_TEXT[e];
    ctx.fillText(energy,x+5,y+55);
  };
  for(let j=0;j<state.stadium.length;j++)drawCard(330,420,state.stadium[j]);
  for(let p=0;p<2;p++){
    const ps=state.players[p];
    ctx.fillText('Active',p==0?245:425,270);
    ctx.fillText('Bench',p==0?145:525,10);
    ctx.fillText('Hand',p==0?15:655,10);
    ctx.fillText('Deck '+ps.deckCount,p==0?258:438,165);
    ctx.fillText('Discard '+ps.discard.length,p==0?245:425,185);
    ctx.fillText('Prize '+ps.prize.length,p==0?258:438,220);
    for(let j=0;j<ps.active.length;j++)drawField(p==0?240:420,kvPosY(j,ps.active.length),ps.active[j]);
    for(let j=0;j<ps.bench.length;j++)drawField(p==0?140:520,kvPosY(j,ps.bench.length),ps.bench[j]);
    for(let j=0;j<ps.hand.length;j++)drawCard(p==0?10:650,kvPosY(j,ps.hand.length),ps.hand[j]);
  }
  // 勝敗ラベルは最後（最前面）に白背景付きで描く。カードに隠れないように。
  if(state.result>=0){
    ctx.font='20px sans-serif';
    let label='Draw';
    if(state.result!=2){
      let nm=players[state.result];
      while(nm.length>4&&ctx.measureText(nm+'… Win').width>KV_W-80)nm=nm.slice(0,-1);
      label=(nm===players[state.result])?nm+' Win':nm+'… Win';
    }
    const w=ctx.measureText(label).width, x=Math.max(20,(KV_W-w)/2);
    ctx.fillStyle='rgba(255,255,255,.92)';ctx.fillRect(x-12,118,w+24,32);
    ctx.strokeRect(x-12,118,w+24,32);
    ctx.fillStyle='#1c2340';ctx.fillText(label,x,141);
  }
}

function eneIcons(types,energy){
  if(Array.isArray(types)&&types.length)return types.map(e=>`<span class="enei">${(ENE_ICON[e.type]||'⭐').repeat(e.count)}</span>`).join('');
  return '●'.repeat(energy||0);
}
function tile(c,o={}){
  if(!c)return '<div class="empty-c">なし</div>';
  const t=c.type||'COLORLESS';const {active=false,hp=null,maxHp=null,energy=null,energyTypes=null}=o;
  let ov='';
  if(hp!=null&&maxHp!=null){const p=Math.max(0,Math.round(100*hp/maxHp));
    ov=`<div class="ov"><div class="ovln"><span>HP ${hp}/${maxHp}</span><span class="ovene">${eneIcons(energyTypes,energy)}</span></div><div class="hpbar"><i style="width:${p}%"></i></div></div>`;}
  if(c.img)return `<div class="pcard imgcard ${active?'active':''}"><img class="full" src="${c.img}" loading="lazy" draggable="false">${ov}</div>`;
  let hpln=(hp!=null&&maxHp!=null)?`<div class="ln"><span>HP</span><span>${hp}/${maxHp}</span></div>`:'';
  return `<div class="pcard ${active?'active':''}"><div class="bar c-${t}"></div><div class="bd"><div class="nm">${c.name}</div><div class="art a-${t}">${ICON[t]||'⭐'}</div>${hpln}<div class="ene">${eneIcons(energyTypes,energy)}</div></div></div>`;
}
function benchHtml(bench){const s=(bench||[]).map(b=>b?tile(b,{hp:b.hp,maxHp:b.maxHp,energy:b.energy,energyTypes:b.energyTypes}):'<div class="empty-c">－</div>');return s.length?s.join(''):'<div class="empty-c">ベンチなし</div>';}
function sideHtml(s){const backs=Array.from({length:Math.max(0,s.prize)},()=>'<div class="prizeback"></div>').join('');
  return `<div><div class="sblabel">サイド ${s.prize}</div><div class="prizegrid">${backs}</div></div><div class="pile"><span class="pcount">${s.deck}</span><span class="plabel">山札</span></div>`;}
function pilesHtml(s){const cond=s.conditions&&s.conditions.length?`<div class="pile" style="border-color:#f0b4be"><span class="plabel" style="color:#e0556b">${s.conditions.join(' ')}</span></div>`:'';
  return `<div class="pile"><span class="pcount">${s.discard}</span><span class="plabel">トラッシュ</span></div>${cond}`;}
function handHtml(hand){return (hand&&hand.length)?hand.map(c=>tile(c,{})).join(''):'<span class="hint">なし</span>';}

function renderBoard(b){
  document.getElementById('turnInfo').textContent=`ターン ${b.turn}`;
  const oa=b.opp.active, ya=b.you.active;
  document.getElementById('oppActive').innerHTML=tile(oa,{active:true,hp:oa&&oa.hp,maxHp:oa&&oa.maxHp,energy:oa&&oa.energy,energyTypes:oa&&oa.energyTypes});
  document.getElementById('youActive').innerHTML=tile(ya,{active:true,hp:ya&&ya.hp,maxHp:ya&&ya.maxHp,energy:ya&&ya.energy,energyTypes:ya&&ya.energyTypes});
  document.getElementById('oppBench').innerHTML=benchHtml(b.opp.bench);
  document.getElementById('youBench').innerHTML=benchHtml(b.you.bench);
  document.getElementById('oppSide').innerHTML=sideHtml(b.opp);
  document.getElementById('youSide').innerHTML=sideHtml(b.you);
  document.getElementById('oppPiles').innerHTML=pilesHtml(b.opp);
  document.getElementById('youPiles').innerHTML=pilesHtml(b.you);
  document.getElementById('oppHand').innerHTML=handHtml(b.opp.hand);
  document.getElementById('youHand').innerHTML=handHtml(b.you.hand);
}
function pushLog(ev){const body=document.getElementById('repLogBody');const d=document.createElement('div');d.className='ev '+(ev.who||'sys');d.textContent=(ev.turn!=null?`[T${ev.turn}] `:'')+ev.text;body.appendChild(d);body.scrollTop=body.scrollHeight;}
function rebuildLog(upto){const body=document.getElementById('repLogBody');body.innerHTML='';for(let k=0;k<=upto&&k<FRAMES.length;k++)(FRAMES[k].events||[]).forEach(pushLog);}

function showFrame(i){
  const len=VISMODE?KVIS.length:FRAMES.length;
  idx=Math.max(0,Math.min(len-1,i));
  if(VISMODE){renderKaggle(idx);}
  else{if(FRAMES[idx])renderBoard(FRAMES[idx].board);rebuildLog(idx);}
  renderControls();
}
function frameCount(){return VISMODE?KVIS.length:FRAMES.length;}
function renderControls(){
  const box=document.getElementById('repControls');
  if(!frameCount()){box.innerHTML='<div class="hint">対戦を選択してください。</div>';return;}
  const spdBtns=[1,2,3,5,10].map(m=>`<button class="spd2${spd===m?' on':''}" data-m="${m}">${m}x</button>`).join('');
  box.innerHTML=`
    <button id="rPrev">◀ 前</button>
    <button id="rPlay">${playing?'⏸ 一時停止':'▶ 再生'}</button>
    <button id="rNext">次 ▶</button>
    <input type="range" id="rSlider" min="0" max="${frameCount()-1}" value="${idx}">
    <span class="hint">${idx+1} / ${frameCount()}</span>
    <span>速度 ${spdBtns}</span>`;
  document.getElementById('rPrev').onclick=()=>{pause();showFrame(idx-1);};
  document.getElementById('rNext').onclick=()=>{pause();showFrame(idx+1);};
  document.getElementById('rPlay').onclick=()=>playing?pause():play();
  document.getElementById('rSlider').oninput=e=>{pause();showFrame(+e.target.value);};
  box.querySelectorAll('button.spd2').forEach(b=>b.onclick=()=>{
    spd=+b.dataset.m;
    if(playing){playBase=idx;playT0=Date.now();}  // 途中の速度変更は現在位置から計り直す
    renderControls();
  });
}
/* 再生は経過時間ベースで進める。タブが非アクティブでタイマーが間引かれても、
   戻った瞬間に本来の位置へ追いつく（従来のタイマー連鎖だと止まったままに見えた）。 */
let playT0=0, playBase=0;
function frameMs(){return Math.max(120, 900/spd);}
function play(){
  if(idx>=frameCount()-1)showFrame(0);   // 末尾からの再生は先頭に巻き戻す
  playing=true; playBase=idx; playT0=Date.now();
  renderControls(); stepPlay();
}
function pause(){playing=false;if(timer){clearTimeout(timer);timer=null;}renderControls();}
function stepPlay(){
  if(!playing)return;
  try{
    const target=Math.min(frameCount()-1, playBase+Math.floor((Date.now()-playT0)/frameMs()));
    if(target>idx){
      idx=target;
      if(VISMODE){renderKaggle(idx);}
      else{renderBoard(FRAMES[idx].board);rebuildLog(idx);}
      renderControls();
    }
    if(idx>=frameCount()-1){pause();return;}
  }catch(e){pause();return;}   // 描画エラーで再生ループが静かに死なないように
  timer=setTimeout(stepPlay, 120);
}

async function loadLog(file, el){
  pause();
  document.querySelectorAll('.logItem').forEach(x=>x.classList.remove('sel'));
  if(el)el.classList.add('sel');
  const d=await get('/api/logs/'+encodeURIComponent(file));
  META=d; FRAMES=d.frames||[]; KVIS=d.visualize||[];
  // AI vs AI は Kaggle 公式ビジュアライザと同じ描画で見る（visualize データがある場合）
  const useKaggle=(d.mode==='ai'&&KVIS.length>0);
  document.getElementById('kvis').innerHTML='';   // 選択し直しで canvas を作り直す
  setVisMode(useKaggle);
  document.getElementById('repMeta').textContent=`${d.player0} vs ${d.player1} ／ 勝者: ${d.winner}（${useKaggle?KVIS.length:FRAMES.length}フレーム）`;
  document.getElementById('repLogBody').innerHTML='';
  if(!useKaggle&&!FRAMES.length){document.getElementById('repMeta').textContent+=' ※リプレイ用フレームがありません（この機能の追加より前の対戦）';}
  // Kaggle盤面は最終フレーム（決着盤面）を初期表示。開始前の空盤面だと壊れて見えるため。
  showFrame(useKaggle?KVIS.length-1:0);
}
function fmtTime(s){if(!s)return '';return s.replace('T',' ').split('.')[0]+' UTC';}

let ALL_LOGS=[];
// 日付(YYYY-MM-DD)・デッキ/AI名でフィルタした一覧を返す。
function applyFilters(){
  const txt=(document.getElementById('fltText').value||'').trim().toLowerCase();
  const from=document.getElementById('fltFrom').value;  // YYYY-MM-DD
  const to=document.getElementById('fltTo').value;
  return ALL_LOGS.filter(l=>{
    if(txt){const hay=((l.player0||'')+' '+(l.player1||'')).toLowerCase();if(hay.indexOf(txt)<0)return false;}
    if(from||to){const d=(l.finished_at||'').slice(0,10);if(!d)return false;if(from&&d<from)return false;if(to&&d>to)return false;}
    return true;
  });
}
function selectedFiles(){return [...document.querySelectorAll('.logChk:checked')].map(c=>c.dataset.file);}
function syncDownloadBtn(){
  const n=selectedFiles().length;
  const btn=document.getElementById('dlSelected');
  btn.disabled=(n===0);
  btn.textContent=n?`⬇ 選択 ${n} 件をZIPでダウンロード`:'⬇ 選択をZIPでダウンロード';
  const all=document.getElementById('fltSelectAll');
  const boxes=[...document.querySelectorAll('.logChk')];
  all.checked=boxes.length>0&&boxes.every(b=>b.checked);
}
function renderList(){
  const box=document.getElementById('logList');
  if(!ALL_LOGS.length){box.innerHTML='<div class="hint">保存された対戦ログがありません。対戦を最後まで進めると保存されます。</div>';document.getElementById('fltCount').textContent='';syncDownloadBtn();return;}
  const filtered=applyFilters();
  document.getElementById('fltCount').textContent=`${filtered.length} / ${ALL_LOGS.length} 件`;
  if(!filtered.length){box.innerHTML='<div class="hint">条件に一致するログがありません。</div>';syncDownloadBtn();return;}
  box.innerHTML='';
  filtered.forEach(l=>{
    const el=document.createElement('div');el.className='logItem';
    el.innerHTML=`<div class="logTop">
        <input type="checkbox" class="logChk" data-file="${l.file}">
        <a class="dlOne" href="/api/logs/${encodeURIComponent(l.file)}/download" title="このログ単体をダウンロード" download>⬇</a>
      </div>
      <div class="vs">${l.player0}<br>vs ${l.player1}</div>
      <div class="meta">${({human:'人 vs AI',ai:'AI vs AI',pvp:'人 vs 人'})[l.mode]||l.mode}／勝者:${l.winner}<br>${fmtTime(l.finished_at)}・${l.frames}フレーム</div>`;
    el.querySelector('.vs').onclick=()=>loadLog(l.file, el);
    el.querySelector('.meta').onclick=()=>loadLog(l.file, el);
    el.querySelector('.logChk').onchange=syncDownloadBtn;
    el.querySelector('.dlOne').onclick=e=>e.stopPropagation();
    box.appendChild(el);
  });
  syncDownloadBtn();
}
async function downloadZip(){
  const files=selectedFiles();
  if(!files.length)return;
  const prog=document.getElementById('dlProgress');
  const bar=prog.querySelector('i'), pct=prog.querySelector('.pct');
  prog.classList.remove('hidden');bar.style.width='0%';pct.textContent='0%';
  const btn=document.getElementById('dlSelected');btn.disabled=true;
  try{
    const res=await fetch('/api/logs/download?files='+encodeURIComponent(files.join(',')));
    if(!res.ok){let e={};try{e=await res.json();}catch(_){}throw new Error(e.error||('HTTP '+res.status));}
    const total=+(res.headers.get('Content-Length')||0);
    const reader=res.body.getReader();const chunks=[];let received=0;
    while(true){
      const {done,value}=await reader.read();
      if(done)break;
      chunks.push(value);received+=value.length;
      if(total){const p=Math.round(100*received/total);bar.style.width=p+'%';pct.textContent=p+'%';}
      else{pct.textContent=Math.round(received/1024)+' KB';}
    }
    bar.style.width='100%';pct.textContent='100%';
    const blob=new Blob(chunks,{type:'application/zip'});
    const cd=res.headers.get('Content-Disposition')||'';
    const m=cd.match(/filename="?([^"]+)"?/);
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=(m&&m[1])||'battle_logs.zip';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
    setTimeout(()=>prog.classList.add('hidden'),1500);
  }catch(err){pct.textContent='失敗: '+(err.message||err);}
  finally{syncDownloadBtn();}
}
async function loadList(){
  const d=await get('/api/logs');
  ALL_LOGS=d.logs||[];
  renderList();
  // /replay?log=<file> で開かれたら、そのログを自動で選択して再生準備する
  const want=new URLSearchParams(location.search).get('log');
  if(want&&ALL_LOGS.some(l=>l.file===want)){
    const el=[...document.querySelectorAll('.logChk')].find(c=>c.dataset.file===want)?.closest('.logItem');
    loadLog(want, el||null);
  }
}
document.getElementById('fltText').oninput=renderList;
document.getElementById('fltFrom').onchange=renderList;
document.getElementById('fltTo').onchange=renderList;
document.getElementById('fltSelectAll').onchange=e=>{
  document.querySelectorAll('.logChk').forEach(c=>c.checked=e.target.checked);
  syncDownloadBtn();
};
document.getElementById('dlSelected').onclick=downloadZip;
renderControls();
loadList();
</script>
{% endblock %}
