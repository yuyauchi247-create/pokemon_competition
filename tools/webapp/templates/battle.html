{% extends "base.html" %}
{% block title %}対戦 | ポケカ 人 vs AI{% endblock %}

{% block nav %}
<button type="button" class="gray" onclick="location.href='/'">相手・デッキ選択へ</button>
{% endblock %}

{% block head %}
<style>
  @keyframes cardGlow{0%,100%{box-shadow:0 0 0 0 rgba(43,140,255,0);}50%{box-shadow:0 0 0 5px rgba(43,140,255,.6);}}
  .pcard.glow{animation:cardGlow 1.2s ease-in-out infinite;outline:2px solid #2b8cff;outline-offset:1px;border-radius:10px;cursor:pointer;z-index:3;}
  .pcard.selpick{outline:3px solid #1565d8;outline-offset:1px;border-radius:10px;box-shadow:0 0 0 4px rgba(21,101,216,.25);animation:none;}
  .glowhint{color:#1769d6;font-weight:800;}
  .handprompt{margin-bottom:8px;padding:9px 14px;border-radius:10px;background:#eaf3ff;border:1px solid #b9d4f5;color:#1769d6;font-weight:800;font-size:15px;}
  .hidden{display:none;}
  .battle{display:grid;grid-template-columns:1fr 300px;gap:14px;max-width:1240px;margin:14px auto;padding:0 14px;align-items:start;}
  @media(max-width:980px){.battle{grid-template-columns:1fr;}}
  .stage{min-width:0;}
  .nogame{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:34px;text-align:center;color:var(--sub);line-height:1.8;}
  .playmat{--bcard:92px;position:relative;display:grid;
    grid-template-columns:minmax(150px,.8fr) minmax(0,1.9fr) minmax(150px,.8fr);
    grid-template-rows:auto auto auto;
    grid-template-areas:"oppside oppbench opppiles" "midl actives midr" "youside youbench youpiles";
    gap:14px;padding:18px;border-radius:22px;
    background:radial-gradient(circle at 50% 50%,rgba(14,165,183,.08),transparent 40%),linear-gradient(180deg,#eef6fc,#e7f0f8);
    border:1px solid #d3e0ec;box-shadow:inset 0 0 0 2px #ffffffcc,0 12px 34px #0b346b16;overflow:hidden;}
  .playmat::before{content:"";position:absolute;left:50%;top:50%;width:210px;height:210px;transform:translate(-50%,-50%);z-index:0;opacity:.38;pointer-events:none;
    border-radius:50%;border:11px solid #b9cbe0;
    background:linear-gradient(#0000 calc(50% - 6px),#b9cbe0 calc(50% - 6px) calc(50% + 6px),#0000 calc(50% + 6px));}
  .playmat::after{content:"";position:absolute;left:50%;top:50%;width:40px;height:40px;transform:translate(-50%,-50%);z-index:0;opacity:.5;
    border-radius:50%;background:#fff;border:8px solid #b9cbe0;pointer-events:none;}
  .playmat>*{position:relative;z-index:1;min-width:0;}
  #oppSide{grid-area:oppside}#oppBench{grid-area:oppbench}#oppPiles{grid-area:opppiles}
  #actives{grid-area:actives}
  #stadium{grid-area:midl;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  #stadium .stadlbl{font-size:11px;color:var(--sub);font-weight:700;}
  #youSide{grid-area:youside}#youBench{grid-area:youbench}#youPiles{grid-area:youpiles}
  .zone-bench{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;min-height:calc(var(--bcard)*1.45);border-radius:14px;padding:6px;}
  .zone-bench.you{background:#ffffff66;outline:1px dashed #bcd0e6;}
  .zone-actives{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
  .active-wrap{display:flex;justify-content:center;}
  .midline{font-weight:800;color:#9fb3c7;font-size:12px;letter-spacing:.18em;}
  .zone-side{display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;}
  .sidebox{text-align:center;}
  .sblabel{font-size:12px;color:var(--sub);font-weight:700;margin-bottom:4px;}
  .prizegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;justify-content:center;}
  .prizeback{width:25px;height:34px;border-radius:4px;background:linear-gradient(135deg,#5b8def,#274a9e);box-shadow:0 1px 3px #0b346b40;}
  .pile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-width:70px;padding:9px 10px;border-radius:12px;
    background:#ffffffcc;border:1px solid var(--line);box-shadow:0 2px 8px #0b346b12;}
  button.pile{cursor:pointer;}
  button.pile:hover{border-color:var(--teal);transform:translateY(-1px);}
  .pile .pcount{font-size:18px;font-weight:800;color:var(--ink);}
  .pile .plabel{font-size:11px;color:var(--sub);font-weight:700;}
  .playmat .pcard{width:var(--bcard);}
  .playmat .pcard.imgcard{width:var(--bcard);}
  .zone-actives .pcard{width:calc(var(--bcard)*1.7);}
  .playmat .empty-c{width:var(--bcard);height:calc(var(--bcard)*1.36);font-size:11px;}
  .zone-actives .empty-c{width:calc(var(--bcard)*1.7);height:calc(var(--bcard)*1.7*1.36);}
  .handzone{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;margin-top:12px;box-shadow:0 4px 18px #0b346b0a;}
  .handlabel{font-size:12px;color:var(--sub);font-weight:700;margin-bottom:8px;}
  .handlabel.oppHandLabel{margin-top:12px;}
  #ask{margin-top:12px;}
  .opts{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;}
  .optcard{cursor:pointer;border-radius:10px;border:2px solid transparent;transition:transform .1s,box-shadow .1s;position:relative;}
  .optcard:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(11,52,107,.2);}
  .optcard.selp{border-color:#1565d8;box-shadow:0 0 0 3px rgba(21,101,216,.3);}
  .optcard .pcard,.optcard .pcard.imgcard{width:92px;}
  .optcard .backimg{width:92px;height:128px;border-radius:8px;display:block;box-shadow:0 2px 8px #0b346b40;}
  .optcard .baklbl{position:absolute;bottom:5px;left:0;right:0;text-align:center;font-size:11px;font-weight:800;color:#fff;text-shadow:0 1px 3px #000;}
  /* コイントス演出 */
  .coinOverlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(10,30,60,.35);}
  .coinOverlay.hidden{display:none;}
  .coinStage{display:flex;flex-direction:column;align-items:center;gap:14px;perspective:600px;}
  .coin{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#7a5a00;
    background:radial-gradient(circle at 35% 30%,#fff0b0,#f4c026 60%,#b88a10);box-shadow:0 8px 24px rgba(0,0,0,.45),inset 0 0 0 5px rgba(255,255,255,.45);}
  .coin.spinning{animation:coinSpin .22s linear infinite;}
  @keyframes coinSpin{0%{transform:rotateX(0deg) scale(1);}50%{transform:rotateX(180deg) scale(1.12);}100%{transform:rotateX(360deg) scale(1);}}
  .coin.heads{background:radial-gradient(circle at 35% 30%,#fff0b0,#f4c026 60%,#b88a10);}
  .coin.tails{background:radial-gradient(circle at 35% 30%,#e3eaf3,#9fb2c8 60%,#6c8099);color:#33485f;}
  .coinResult{font-size:22px;font-weight:900;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.55);}
  /* きぜつ→トラッシュ 演出 */
  .pcard.koanim{animation:koFall 1s ease-in forwards;position:relative;z-index:5;}
  @keyframes koFall{0%{transform:none;filter:none;}18%{transform:translateY(-5px) rotate(-3deg);}
    45%{filter:grayscale(.5) brightness(1.15);}100%{filter:grayscale(1) brightness(.65);opacity:0;transform:translateY(46px) rotate(9deg) scale(.82);}}
  .kobadge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#d12f3f;color:#fff;font-weight:900;font-size:12px;padding:3px 9px;border-radius:8px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.45);z-index:7;pointer-events:none;animation:koBadge 1s ease forwards;}
  @keyframes koBadge{0%{opacity:0;transform:translate(-50%,-50%) scale(.5);}22%{opacity:1;transform:translate(-50%,-50%) scale(1.12);}80%{opacity:1;}100%{opacity:0;}}
  /* ダメージ/攻撃 演出 */
  .dmgpop{position:absolute;top:2px;left:50%;color:#fff;background:#d12f3f;font-weight:900;font-size:15px;padding:2px 9px;border-radius:9px;box-shadow:0 2px 8px rgba(0,0,0,.45);z-index:8;pointer-events:none;white-space:nowrap;animation:dmgRise 1.1s ease-out forwards;}
  @keyframes dmgRise{0%{opacity:0;transform:translate(-50%,8px) scale(.7);}16%{opacity:1;transform:translate(-50%,-4px) scale(1.18);}70%{opacity:1;transform:translate(-50%,-20px) scale(1);}100%{opacity:0;transform:translate(-50%,-34px) scale(.95);}}
  .pcard.hitflash{animation:hitFlash .5s ease;}
  @keyframes hitFlash{0%,100%{filter:none;box-shadow:none;}28%{filter:brightness(1.55) saturate(1.4);box-shadow:0 0 0 3px rgba(209,47,63,.6);}55%{filter:brightness(.92);}}
  .pcard.lungeUp{animation:lungeUp .42s ease;}
  .pcard.lungeDown{animation:lungeDown .42s ease;}
  @keyframes lungeUp{0%,100%{transform:translateY(0);}42%{transform:translateY(-16px) scale(1.08);}}
  @keyframes lungeDown{0%,100%{transform:translateY(0);}42%{transform:translateY(16px) scale(1.08);}}
  /* 対象カードの隣に「Nダメージ！」を大きく表示 */
  .dmgcw{position:fixed;z-index:70;transform:translateY(-50%);pointer-events:none;}
  .dmgcallout{font-weight:900;font-size:30px;line-height:1;color:#fff;background:linear-gradient(135deg,#ff5b5b,#d61f2f);
    padding:7px 16px;border-radius:12px;border:3px solid #fff;box-shadow:0 6px 22px rgba(0,0,0,.45);white-space:nowrap;
    text-shadow:0 2px 4px rgba(0,0,0,.45);transform-origin:center;animation:dmgCallout 1.3s cubic-bezier(.2,1.4,.4,1) forwards;}
  @keyframes dmgCallout{0%{opacity:0;transform:scale(.3) rotate(-8deg);}18%{opacity:1;transform:scale(1.28) rotate(3deg);}
    32%{transform:scale(1) rotate(0);}80%{opacity:1;}100%{opacity:0;transform:scale(1.06);}}
  /* 効果/特性/入れ替えの告知トースト＋バトル場強調 */
  .gtoast{position:fixed;top:72px;left:50%;z-index:66;background:rgba(18,38,68,.94);color:#fff;font-weight:800;font-size:16px;
    padding:10px 20px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.25);
    white-space:nowrap;pointer-events:none;max-width:90vw;overflow:hidden;text-overflow:ellipsis;animation:gtoast 1.2s ease forwards;}
  @keyframes gtoast{0%{opacity:0;transform:translate(-50%,-12px) scale(.92);}14%{opacity:1;transform:translate(-50%,0) scale(1);}82%{opacity:1;}100%{opacity:0;transform:translate(-50%,-8px);}}
  .pcard.actpulse{outline:3px solid #2bd07a;outline-offset:2px;border-radius:10px;animation:actPulse .9s ease 2;}
  @keyframes actPulse{0%,100%{box-shadow:0 0 0 0 rgba(43,208,122,0);}50%{box-shadow:0 0 0 9px rgba(43,208,122,.5);}}
  /* 山札→手札のドロー演出：裏面カードが山札から手札へ飛ぶ */
  .flyCard{position:fixed;z-index:60;border-radius:5px;border:1px solid #fff;box-shadow:0 4px 14px #0b346b55;
    opacity:.35;pointer-events:none;will-change:transform,opacity;
    transition:transform .46s cubic-bezier(.2,.8,.3,1),opacity .46s ease;}
  .flyCard.land{opacity:0;}
  /* 場に出たポケモンのポップ表示（バトル場→ベンチの順で見せる） */
  .pcard.placePop{animation:placePop .42s cubic-bezier(.2,1.5,.4,1) both;}
  @keyframes placePop{0%{opacity:0;transform:scale(.55) translateY(10px);}60%{opacity:1;transform:scale(1.08);}100%{opacity:1;transform:scale(1);}}
  .zone-bench.benchReveal{opacity:0;}
  /* 対戦後の「もう一度対戦」 */
  #banner .bmsg{font-size:1.05em;font-weight:900;}
  #banner .bask{margin-top:6px;font-size:14px;font-weight:700;opacity:.9;}
  #banner .bactions{margin-top:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  #banner .bactions button{font-size:14px;padding:9px 16px;}
  .aiControls{margin-top:12px;background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--teal);border-radius:14px;padding:14px;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;box-shadow:0 4px 18px #0b346b0a;}
  .aiControls .speed{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--sub);font-weight:700;}
  .aiControls button.spd{background:#eaf0f7;color:#46566b;box-shadow:none;padding:6px 12px;}
  .aiControls button.spd.on{background:var(--blue);color:#fff;}
  .aiDone{font-weight:800;color:var(--teal);}
  .discardGrid{display:flex;flex-wrap:wrap;gap:6px;max-height:340px;overflow:auto;}
  .discardGrid img{width:60px;border-radius:5px;}
  .discardGrid .ph{width:60px;height:82px;background:#eef2f7;border-radius:5px;font-size:9px;display:flex;align-items:center;justify-content:center;text-align:center;color:#789;}
  .discardGrid img,.discardGrid .ph{cursor:pointer;transition:transform .1s;}
  .discardGrid img:hover,.discardGrid .ph:hover{transform:translateY(-3px);box-shadow:0 6px 14px #0b346b2e;}
  /* トラッシュ: 実カードを数枚重ねて表示（クリックで一覧→詳細） */
  .trashPile{padding:5px 7px;}
  .trashStack{position:relative;display:flex;align-items:center;justify-content:center;height:58px;}
  .trashStack img,.trashStack .ph{width:40px;height:56px;border-radius:5px;object-fit:cover;border:1px solid #fff;box-shadow:0 1px 4px #0b346b44;}
  .trashStack img:not(:first-child),.trashStack .ph:not(:first-child){margin-left:-26px;}
  .trashStack .ph{background:#cfdbe8;}
  .trashEmpty{height:58px;display:flex;align-items:center;font-size:12px;color:#9fb0c4;}
  /* 山札: 裏面カードを重ねてデッキの厚みを表現（中身は非公開なのでクリック無し） */
  .deckPile .deckStack{position:relative;width:60px;height:70px;}
  .deckStack .deckback{position:absolute;width:48px;border-radius:5px;border:1px solid #fff;box-shadow:0 1px 3px #0b346b40;}
  .deckStack .deckcount{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:17px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);z-index:5;}
  /* 相手の手札（中身は伏せ、枚数ぶん裏面を表示） */
  #oppHand .handback{width:54px;border-radius:6px;display:inline-block;box-shadow:0 2px 6px #0b346b30;vertical-align:bottom;}
  #oppHand .handback:not(:first-child){margin-left:-22px;}  /* 少し重ねて省スペース */
  /* カード使用の中央アニメ（人vs人） */
  .cardUseOverlay{position:fixed;inset:0;z-index:65;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .cardUseCard{width:220px;max-width:60vw;border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.5);
    animation:cardUseIn .35s cubic-bezier(.2,1.2,.4,1) both;}
  .cardUseOverlay.out .cardUseCard{animation:cardUseOut .4s ease forwards;}
  @keyframes cardUseIn{from{opacity:0;transform:scale(.6) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
  @keyframes cardUseOut{to{opacity:0;transform:scale(.85) translateY(-10px);}}
  @media(max-width:980px){ #log{height:320px;} }
  /* ===== スマホ最適化：プレイマットを縮小して横はみ出し/見切れを防ぐ ===== */
  @media(max-width:640px){
    .battle{padding:0 8px;margin:10px auto;gap:10px;}
    .playmat{--bcard:52px;padding:9px;gap:6px;
      grid-template-columns:minmax(58px,.7fr) minmax(0,2fr) minmax(58px,.7fr);}
    .playmat::before{width:108px;height:108px;border-width:7px;}
    .playmat::after{width:22px;height:22px;border-width:6px;}
    .zone-bench{gap:5px;min-height:calc(var(--bcard)*1.4);}
    .pile{min-width:42px;padding:5px 6px;}
    .pile .pcount{font-size:14px;} .pile .plabel{font-size:9px;}
    .prizegrid{gap:2px;} .prizeback{width:15px;height:21px;}
    .midline{font-size:10px;letter-spacing:.1em;}
    .handzone{padding:10px;}
    .handzone .pcard,.handzone .pcard.imgcard{width:84px;}
    .handprompt{font-size:14px;padding:8px 12px;}
    .optcard .pcard,.optcard .pcard.imgcard{width:78px;}
    .optcard .backimg{width:78px;height:108px;}
    #log{height:240px;}
    .aiControls{gap:10px;padding:11px;}
  }
  @media(max-width:380px){
    .playmat{--bcard:46px;
      grid-template-columns:minmax(52px,.7fr) minmax(0,2fr) minmax(52px,.7fr);}
    .handzone .pcard,.handzone .pcard.imgcard{width:76px;}
  }
</style>
{% endblock %}

{% block content %}
<main class="battle">
  <div class="stage">
    <div id="banner"></div>
    <div id="noGame" class="nogame hidden"></div>
    <section class="playmat" id="playmat">
      <div class="zone-side" id="oppSide"></div>
      <div class="zone-bench opp" id="oppBench"></div>
      <div class="zone-side" id="oppPiles"></div>
      <div class="zone-side" id="stadium"></div>
      <div class="zone-actives" id="actives">
        <div class="active-wrap"><div id="oppActive"></div></div>
        <div class="midline">VS</div>
        <div class="active-wrap"><div id="youActive"></div></div>
      </div>
      <div class="zone-side" id="youSide"></div>
      <div class="zone-bench you" id="youBench"></div>
      <div class="zone-side" id="youPiles"></div>
    </section>
    <div id="coinOverlay" class="coinOverlay hidden">
      <div class="coinStage"><div id="coin" class="coin"></div><div id="coinResult" class="coinResult"></div></div>
    </div>
    <div id="ask"></div>
    <div id="aiControls" class="aiControls hidden"></div>
    <div class="handzone">
      <div class="handprompt hidden" id="handPrompt"></div>
      <div class="handlabel" id="youHandLabel">あなたの手札</div>
      <div class="row" id="youHand"></div>
      <div class="handlabel oppHandLabel hidden" id="oppHandLabel">相手の手札</div>
      <div class="row hidden" id="oppHand"></div>
    </div>
  </div>
  <div id="log"><h2>対戦ログ</h2><div id="logbody"></div></div>
</main>
{% endblock %}

{% block script %}
<script>
let STATE=null, picks=[], dragHand=null, busy=false;
let aiPlaying=false, aiDelay=700, aiTimer=null, speedMult=1;
const GID=new URLSearchParams(location.search).get('gid')||'';
const TOKEN=localStorage.getItem('pvp_token_'+GID)||'';
const ROYALE=parseInt(new URLSearchParams(location.search).get('royale')||'',10); // バトルロワイヤルの第N戦（NaN=通常対戦）
const ROYALE_TOTAL=parseInt(new URLSearchParams(location.search).get('rt')||'5',10); // ロワイヤル総ステップ数
function qs(){return '?gid='+encodeURIComponent(GID)+(TOKEN?('&token='+encodeURIComponent(TOKEN)):'');}
let lastVer=-1, pvpTimer=null;
const ENE_ICON={GRASS:'🍃',FIRE:'🔥',WATER:'💧',LIGHTNING:'⚡',PSYCHIC:'🔮',FIGHTING:'👊',DARKNESS:'🌙',METAL:'⚙️',DRAGON:'🐉',COLORLESS:'⭐',RAINBOW:'🌈',TEAM_ROCKET:'🚀'};
const HAND=2, ACTIVE=4, BENCH=5, PRIZE=6, STADIUM=7;
const CTX={

  4:'バトル場に出すポケモンを選んでください',
  5:'ベンチに出すポケモンを選んでください',
  6:'場に出すポケモンを選んでください',
  7:'手札に加えるカードを選んでください',
  8:'トラッシュするカードを選んでください',

  10:'山札の下に戻すカードを選んでください',

  12:'そのままにするカードを選んでください',
  13:'ダメカンを乗せるポケモンを選んでください',
  14:'ダメカンを乗せるポケモンを選んでください',
  15:'ダメージを与えるポケモンを選んでください',
  16:'ダメカンを取り除くポケモンを選んでください',
  17:'回復するポケモンを選んでください',
  18:'進化元のポケモンを選んでください',
  19:'進化先のポケモンを選んでください',
  20:'退化させるポケモンを選んでください',
  21:'カードをつける相手のポケモンを選んでください',
  22:'ポケモンにつけるカードを選んでください',
  23:'カードを外すポケモンを選んでください',
  24:'確認するカードを選んでください',
  25:'効果の対象にするカードを選んでください',
  26:'トラッシュするエネルギーカードを選んでください',
  27:'トラッシュするどうぐを選んでください',

// energyTypes（[{type,count},...]）をタイプ別アイコン列に変換。無ければ●×energyにフォールバック。
function eneIcons(energyTypes,energy){
  if(Array.isArray(energyTypes)&&energyTypes.length){
    return energyTypes.map(e=>`<span class="enei" title="${e.type} ×${e.count}">${(ENE_ICON[e.type]||'⭐').repeat(e.count)}</span>`).join('');
  }
  return '●'.repeat(energy||0);
}
// 選択肢ラベルを見やすく整形（NUMBER/YES/NO は文脈に応じた表記にする）
function optLabel(o,context){
  if(o.optionType==='NUMBER'&&o.number!=null){
    if(context===38)return o.number===0?'引かない':`${o.number}枚 引く`;
    if(context===39||context===40)return `ダメカン ${o.number}個`;
    return `${o.number} を選ぶ`;
  }
  if(o.optionType==='YES')return 'はい';
  if(o.optionType==='NO')return 'いいえ';
  if(o.card&&o.card.name)return o.card.name;
  return o.label||('選択'+o.index);
}
function tgtName(o){return (String(o.label).split('→')[1]||'').replace(/[「」]/g,'').trim()||'ポケモン';}

/* ---------- 選択肢の分類（手札／盤面／パネル） ---------- */
function classify(){
  const m={hand:{},board:{},attack:[],panel:[],playHand:new Set(),stadium:[]};
  const s=STATE.select; if(!s)return m;
  s.options.forEach(o=>{
    const ot=o.optionType;
    if(o.area===STADIUM){ m.stadium.push(o); return; }   // 場のスタジアムを対象にする選択肢
    if(ot==='ATTACH'||ot==='EVOLVE'||ot==='PLAY'){
      (m.hand[o.srcIndex]=m.hand[o.srcIndex]||[]).push(o);
      if(ot==='PLAY')m.playHand.add(o.srcIndex);
    } else if(ot==='CARD'){
      if(o.area===HAND)(m.hand[o.srcIndex]=m.hand[o.srcIndex]||[]).push(o);
      else if(o.area===ACTIVE||o.area===BENCH){
        const side=o.side||'you';   // you=自分盤面 / opp=相手盤面（相手ベンチ対象攻撃など）
        const k=side+':'+o.area+':'+o.srcIndex;
        (m.board[k]=m.board[k]||[]).push(o);
      }
      else m.panel.push(o);
    } else if(ot==='ATTACK'){ m.attack.push(o); }
    else if(ot==='RETREAT'||ot==='ABILITY'){ (m.board['you:'+ACTIVE+':0']=m.board['you:'+ACTIVE+':0']||[]).push(o); }
    else m.panel.push(o);
  });
  return m;
}
// 場の位置を日本語に（バトル場 / ベンチN）。同名ポケモンが複数いても区別できるようにする。
function posName(area,idx){
  if(area===ACTIVE)return 'バトル場';
  if(area===BENCH)return 'ベンチ'+(((idx??0)|0)+1);
  return '';
}
function handActions(H){
  const hand=STATE.board.you.hand||[]; const out=[];
  (classify().hand[H]||[]).forEach(o=>{
    const pn=posName(o.inPlayArea,o.inPlayIndex); const suf=pn?`（${pn}）`:'';
    let lbl;
    if(o.optionType==='ATTACH')lbl=`「${tgtName(o)}」${suf}にエネルギーをつける`;
    else if(o.optionType==='EVOLVE')lbl=`「${tgtName(o)}」${suf}を「${o.card?o.card.name:'進化'}」に進化させる`;
    else if(o.optionType==='PLAY')lbl=`「${hand[H]?hand[H].name:''}」を場に出す`;
    else lbl=`「${hand[H]?hand[H].name:''}」を選ぶ`;
    out.push({label:lbl,index:o.index});
  });
  return out;
}
function boardActions(side,area,pos){
  const out=[];
  (classify().board[side+':'+area+':'+pos]||[]).forEach(o=>{
    let lbl = o.optionType==='RETREAT'?'にげる（入れ替え）' : (o.optionType==='ABILITY'?o.label:'このポケモンを選ぶ');
    out.push({label:lbl,index:o.index});
  });
  return out;
}
function attackOptionMap(){
  const m={};
  ((STATE.select&&STATE.select.options)||[]).forEach(o=>{
    if(o.optionType==='ATTACK'&&o.attackId!=null) m[o.attackId]=o.index;});
  return m;
}

/* ---------- カードタイル ---------- */
function tile(c,{active=false,hp=null,maxHp=null,energy=null,energyTypes=null,area=null,pos=null,side=null,hand=null,drag=false,glow=false,sel=false}={}){
  if(!c)return `<div class="empty-c">なし</div>`;
  const t=c.type||'COLORLESS';
  const gc=(glow?' glow':'')+(sel?' selpick':'');
  const attrs=[`data-cid="${c.id}"`];
  if(area!=null)attrs.push(`data-area="${area}"`,`data-pos="${pos}"`,`data-side="${side||'you'}"`);
  if(hand!=null)attrs.push(`data-hand="${hand}"`);
  if(drag)attrs.push('draggable="true"');
  let ov='';
  if(hp!=null&&maxHp!=null){
    const p=Math.max(0,Math.round(100*hp/maxHp));
    ov=`<div class="ov"><div class="ovln"><span>HP ${hp}/${maxHp}</span><span class="ovene">${eneIcons(energyTypes,energy)}</span></div>
        <div class="hpbar"><i style="width:${p}%"></i></div></div>`;
  }
  if(c.img){
    return `<div class="pcard imgcard ${active?'active':''}${gc}" ${attrs.join(' ')}>
       <img class="full" src="${c.img}" loading="lazy" alt="${c.name}" draggable="false">${ov}</div>`;
  }
  let hpln='';
  if(hp!=null&&maxHp!=null){const p=Math.max(0,Math.round(100*hp/maxHp));
    hpln=`<div class="ln"><span>HP</span><span>${hp}/${maxHp}</span></div><div class="hpbar"><i style="width:${p}%"></i></div>`;}
  else if(c.hp){hpln=`<div class="ln"><span>HP</span><span>${c.hp}</span></div>`;}
  const ene=energy!=null?`<div class="ene">${eneIcons(energyTypes,energy)||'　'}</div>`:'';
  return `<div class="pcard ${active?'active':''}${gc}" ${attrs.join(' ')}>
     <div class="bar c-${t}"></div>
     <div class="bd"><div class="nm">${c.name}</div><div class="art a-${t}">${ICON[t]||'⭐'}</div>${hpln}${ene}</div></div>`;
}
function benchHtml(bench,interactive,glowSet,pickSet,side='you'){
  const key=i=>side+':'+BENCH+':'+i;
  const slots=(bench||[]).map((b,i)=> b
    ? tile(b,{hp:b.hp,maxHp:b.maxHp,energy:b.energy,energyTypes:b.energyTypes,area:interactive?BENCH:null,pos:interactive?i:null,side:side,glow:!!(glowSet&&glowSet.has(key(i))),sel:!!(pickSet&&pickSet.has(key(i)))})
    : '<div class="empty-c">－</div>');
  if(!slots.length) slots.push('<div class="empty-c">ベンチなし</div>');
  return slots.join('');
}
function deckPileHtml(s){
  const n=Math.max(0,s.deck||0);
  if(!n) return `<div class="pile"><span class="pcount">0</span><span class="plabel">山札</span></div>`;
  const layers=Math.min(5,Math.max(1,Math.round(n/10)));  // 枚数に応じて厚みを変える(1〜5層)
  let stack='';
  for(let i=0;i<layers;i++) stack+=`<img class="deckback" style="left:${i*2}px;top:${-i*2}px" src="/card_back" alt="" draggable="false">`;
  return `<div class="pile deckPile" title="山札 ${n}枚">
    <div class="deckStack">${stack}<span class="deckcount">${n}</span></div><span class="plabel">山札</span></div>`;
}
function sideHtml(s){
  const backs=Array.from({length:Math.max(0,s.prize)},()=>'<div class="prizeback"></div>').join('');
  return `<div class="sidebox"><div class="sblabel">サイド ${s.prize}</div><div class="prizegrid">${backs}</div></div>
          ${deckPileHtml(s)}`;
}
function pilesHtml(s,who){
  const cond=s.conditions&&s.conditions.length?`<div class="pile" style="border-color:#f0b4be"><span class="plabel" style="color:#e0556b">${s.conditions.join(' ')}</span></div>`:'';
  // トラッシュ: 上の数枚を重ねて表示。クリックで一覧（showDiscard）。
  const cards=s.discardList||[];
  const top=cards.slice(-4);
  const stack=top.length
    ? top.map(c=>c.img?`<img src="${c.img}" alt="" draggable="false">`:'<div class="ph"></div>').join('')
    : '<div class="trashEmpty">空</div>';
  return `<button type="button" class="pile trashPile" data-who="${who}" title="トラッシュ ${s.discard}枚（クリックで一覧）">
    <div class="trashStack">${stack}</div><span class="plabel">トラッシュ ${s.discard}</span></button>${cond}`;
}

/* ---------- 描画 ---------- */
function renderBoard(){
  const b=STATE.board;
  document.getElementById('turnInfo').textContent=b?`ターン ${b.turn}｜${STATE.youLabel||'あなた'} vs ${STATE.oppLabel||'相手'}`:'';
  if(!b)return;
  const oa=b.opp.active, ya=b.you.active;
  // 単一選択(1枚選ぶ)のときだけ、対象の自分の手札/場カードを光らせる
  const sel=STATE.select;
  const cm=classify();
  const boardGlow=new Set(Object.keys(cm.board));
  const gOn=!!sel;   // 選択中はいつでも対象カードを光らせる
  const bPick=new Set(Object.keys(cm.board).filter(k=>(cm.board[k]||[]).some(o=>picks.includes(o.index))));
  // 相手盤面も対象になり得る（例: メガスターミー ジェットブローの相手ベンチ選択）。
  // opp:* のキーがあるときだけ相手アクティブ/ベンチを選択可能にする。
  const oppActInteractive=boardGlow.has('opp:'+ACTIVE+':0');
  document.getElementById('oppActive').innerHTML=tile(oa,{active:true,hp:oa?.hp,maxHp:oa?.maxHp,energy:oa?.energy,energyTypes:oa?.energyTypes,area:oppActInteractive?ACTIVE:null,pos:0,side:'opp',glow:gOn&&oppActInteractive,sel:bPick.has('opp:'+ACTIVE+':0')});
  document.getElementById('youActive').innerHTML=tile(ya,{active:true,hp:ya?.hp,maxHp:ya?.maxHp,energy:ya?.energy,energyTypes:ya?.energyTypes,area:ACTIVE,pos:0,side:'you',glow:gOn&&boardGlow.has('you:'+ACTIVE+':0'),sel:bPick.has('you:'+ACTIVE+':0')});
  const oppBenchInteractive=[...boardGlow].some(k=>k.startsWith('opp:'+BENCH+':'));
  document.getElementById('oppBench').innerHTML=benchHtml(b.opp.bench,oppBenchInteractive,gOn?boardGlow:null,bPick,'opp');
  document.getElementById('youBench').innerHTML=benchHtml(b.you.bench,true,gOn?boardGlow:null,bPick,'you');
  document.getElementById('oppSide').innerHTML=sideHtml(b.opp);
  document.getElementById('youSide').innerHTML=sideHtml(b.you);
  document.getElementById('oppPiles').innerHTML=pilesHtml(b.opp,'opp');
  document.getElementById('youPiles').innerHTML=pilesHtml(b.you,'you');
  // 場のスタジアム（両プレイヤー共有の1枠）。対象になっている選択肢があれば光らせる。
  const stadEl=document.getElementById('stadium');
  if(stadEl){
    if(b.stadium){
      const usable=gOn&&(cm.stadium||[]).length>0;
      stadEl.innerHTML=`<div class="stadlbl">スタジアム</div>`+tile(b.stadium,{glow:usable});
    }else{ stadEl.innerHTML=''; }
  }
  // 手札
  const m=classify();
  const actionable=new Set(Object.keys(m.hand).map(Number));
  document.getElementById('youHand').innerHTML=(b.you.hand||[]).map((c,i)=>
     tile(c,{hand:i,drag:actionable.has(i),glow:gOn&&actionable.has(i),sel:(m.hand[i]||[]).some(o=>picks.includes(o.index))})).join('')||'<span class="hint">なし</span>';
  // AI vs AI のときは相手の手札も公開
  const oppHandRow=document.getElementById('oppHand'), oppHandLabel=document.getElementById('oppHandLabel');
  if(STATE.mode==='ai'&&b.opp.hand){
    document.getElementById('youHandLabel').textContent=(STATE.youLabel||'プレイヤー1')+' の手札';
    oppHandLabel.textContent=(STATE.oppLabel||'プレイヤー2')+' の手札';
    oppHandLabel.classList.remove('hidden'); oppHandRow.classList.remove('hidden');
    oppHandRow.innerHTML=b.opp.hand.map(c=>tile(c,{})).join('')||'<span class="hint">なし</span>';
  }else{
    // 人vsAI / 人vs人: 相手の手札は中身を伏せ、枚数ぶん裏面カードを表示する。
    document.getElementById('youHandLabel').textContent='あなたの手札';
    const n=(b.opp&&b.opp.handCount)||0;
    // 人vs人は相手のデッキを伏せるため「対戦相手の手札」表記に統一する。
    const oppName = STATE.mode==='pvp' ? '対戦相手' : (STATE.oppLabel||'相手');
    oppHandLabel.textContent=oppName+'の手札（'+n+'枚）';
    oppHandLabel.classList.remove('hidden'); oppHandRow.classList.remove('hidden');
    oppHandRow.innerHTML = n
      ? Array.from({length:n},()=>'<img class="handback" src="/card_back" alt="相手の手札（裏向き）" draggable="false">').join('')
      : '<span class="hint">なし</span>';
  }
  bindClicks(); bindDnD();
}
function renderAsk(){
  const ask=document.getElementById('ask');
  const hp=document.getElementById('handPrompt');
  const hideP=()=>{if(hp){hp.classList.add('hidden');hp.textContent='';}};
  ask.style.display='';
  if(STATE.result!==-1){ask.innerHTML='';hideP();return;}
  const s=STATE.select;
  if(!s){ask.innerHTML=STATE.running?'<div class="hint">AIが考えています…</div>':'';hideP();return;}
  const single=(s.minCount===1&&s.maxCount===1);
  const m=classify();
  const btnOpts=m.panel.slice();    // カード以外の選択肢だけ（ボタン表示。カードのタイルは出さない）
  // こうまんしれい等「別のポケモンが持つワザを選んで使う」(context 35=使うワザを選んでください)は、
  // 自分のアクティブのワザではないためカード詳細から辿れない。ここにワザ一覧ボタンとして出す。
  if(s.context===35) m.attack.forEach(o=>btnOpts.push(o));
  picks=[];
  if(single && btnOpts.length===0){ // 手札/場のカードだけ選ぶ → 箱は出さず、手札上にメッセージ＋光るカード
    ask.innerHTML=''; ask.style.display='none';
    if(hp){hp.textContent='👉 '+(CTX[s.context]||'カードを選んでください');hp.classList.remove('hidden');}
    return;
  }
  hideP();
  let h=`<h2>あなたの番です</h2><div class="hint">${CTX[s.context]||'選んでください'}</div>`;
  if(btnOpts.length)h+=`<div class="opts" id="opts"></div>`;
  if(!single)h+=`<div style="margin-top:10px"><button id="confirm">決定 (0/${s.maxCount})</button></div>`;
  ask.innerHTML=h;
  const opts=document.getElementById('opts');
  const pick=(o)=>{ if(single)submit([o.index]); else chooseCard(o.index); };
  if(opts)btnOpts.forEach(o=>{
    if(o.optionType==='ATTACK'){                      // 使うワザ(context35): 元ポケモンのカードを表示し、クリックでワザを選ぶ
      if(o.card){
        // 1ポケモン=1タイル（同カードの複数ワザは詳細モーダルの mvatk で選ぶ）
        if(opts.querySelector(`.optcard[data-cid="${o.card.id}"]`)) return;
        const wrap=document.createElement('div'); wrap.className='optcard'; wrap.dataset.cid=o.card.id;
        wrap.innerHTML=tile(o.card,{});
        wrap.onclick=()=>openCard(o.card.id,[]);      // モーダルで使えるワザ(mvatk)を選ぶ→確認→使用
        opts.appendChild(wrap);
      }else{                                           // カード解決不可時はテキストにフォールバック
        const el=document.createElement('div'); el.className='opt';
        el.textContent=o.label||('ワザ '+o.index);
        el.onclick=()=>submit([o.index]);
        opts.appendChild(el);
      }
      return;
    }
    const faceDown=(o.area===PRIZE);                 // サイドは中身を見せない＝裏面
    const hasImg=!faceDown && o.card && o.card.img;  // 中身が見えるカード選択肢＝表面画像
    if(faceDown || hasImg){
      const wrap=document.createElement('div');
      wrap.className='optcard'+(picks.includes(o.index)?' selp':'');
      wrap.dataset.oi=o.index;
      if(faceDown){
        wrap.innerHTML=`<img class="backimg" src="/card_back" alt="裏向きのカード"><div class="baklbl">サイド</div>`;
        wrap.onclick=()=>pick(o);                    // 面伏せは中身不明→クリックで選択
      }else{
        wrap.innerHTML=tile(o.card,{});
        wrap.onclick=()=>openCard(o.card.id,[{label:single?'このカードを選ぶ':(picks.includes(o.index)?'選択を外す':'このカードを選ぶ'),onclick:()=>pick(o)}]);
      }
      opts.appendChild(wrap);
    }else{
      const el=document.createElement('div'); el.className='opt';
      el.textContent=optLabel(o,s.context);
      el.onclick=()=>pick(o);
      opts.appendChild(el);
    }
  });
  const cb=document.getElementById('confirm');
  if(cb)cb.onclick=()=>{if(picks.length<s.minCount){alert(`${s.minCount}個以上選んでください`);return;}submit(picks);};
}
function updateConfirm(){
  const s=STATE.select; if(!s)return;
  const cb=document.getElementById('confirm');
  if(cb)cb.textContent=`決定 (${picks.length}/${s.maxCount})`;
}
// 手札/場の選択肢カードを選ぶ：単一=即決定 / 複数=トグル
function chooseCard(index){
  const s=STATE.select; if(!s)return;
  if(s.minCount===1&&s.maxCount===1){ submit([index]); return; }
  if(picks.includes(index)){ picks=picks.filter(x=>x!==index); }
  else{ if(picks.length>=s.maxCount)return; picks.push(index); }
  renderBoard(); updateConfirm();
  document.querySelectorAll('#opts .optcard').forEach(el=>el.classList.toggle('selp', picks.includes(+el.dataset.oi)));
}

      <button type="button" class="gray" onclick="location.href='/'">🏠 ホームへ</button>

}

/* ---------- クリック→詳細＋操作モーダル ---------- */
function bindClicks(){

  const bindGroup=(sel,actionsOf)=>{

    els.forEach((el,i)=>el.addEventListener('click',()=>{if(busy)return;
      openCard(list[i].cid,list[i].actions,{list,idx:i});}));

    el=>handActions(+el.dataset.hand).map(a=>({label:a.label,onclick:()=>chooseCard(a.index)})));
  bindGroup('#youActive .pcard[data-cid],#youBench .pcard[data-cid]',
    el=>boardActions(el.dataset.side||'you',+el.dataset.area,+el.dataset.pos).map(a=>({label:a.label,onclick:()=>chooseCard(a.index)})));
  // 相手盤面: data-area が付いている（＝対象になっている）タイルだけ選択アクションを出す。
  bindGroup('#oppActive .pcard[data-cid],#oppBench .pcard[data-cid],#oppHand .pcard[data-cid]',

      : []);

      if(sOpts.length) openCard(+stEl.dataset.cid, sOpts.map(o=>({label:o.label||'このスタジアムを使う',onclick:()=>chooseCard(o.index)})));
      else openCard(+stEl.dataset.cid,[]);

function showDiscard(who){

async function openCard(cid,actions,nav){
  const c=await get('/api/card/'+cid); const t=c.type||'COLORLESS';
  const atkMap=attackOptionMap();
  const mv=(c.moves||[]).map(m=>{
    const eff=m.effect?`<div class="mrow">${(m.effect||'').replace(/\n/g,'<br>')}</div>`:'';
    const head=`<b>${m.name}</b> ${m.cost?'['+m.cost+']':''} <span style="float:right">${m.damage||''}</span>`;
    if(m.attackId!=null){
      const usable=atkMap[m.attackId]!=null;
      return `<button class="mvatk" ${usable?'':'disabled'} data-idx="${usable?atkMap[m.attackId]:''}" data-nm="${m.name}">
                ${head}${eff}</button>`;
    }
    return `<div class="mv">${head}${eff}</div>`;
  }).join('');
  // 付与ワザ: コアメモリ等のどうぐで「このポケモンが使える」ようになったワザは、
  // 基本カードの moves に含まれないため上のループでは出ない。今使えるワザ選択肢
  // (STATE.select の ATTACK) のうち、このカードのもので基本ワザに無いものを追加表示する。
  const baseAtkIds=new Set((c.moves||[]).filter(m=>m.attackId!=null).map(m=>m.attackId));
  // このカードが「今攻撃できるアクティブ」か（基本ワザに使用可能なものがある）。
  // 付与ワザ選択肢の card がコアメモリ側になっても取りこぼさないための緩い判定。
  const canAttackNow=(c.moves||[]).some(m=>m.attackId!=null&&atkMap[m.attackId]!=null);
  const seenGrant=new Set();
  const grantHtml=((STATE.select&&STATE.select.options)||[])
    .filter(o=>o.optionType==='ATTACK'&&o.attackId!=null&&!baseAtkIds.has(o.attackId)
               &&((o.card&&o.card.id===cid)||canAttackNow))
    .filter(o=>{ if(seenGrant.has(o.attackId))return false; seenGrant.add(o.attackId); return true; })
    .map(o=>{
      const nm=String(o.label||'ワザ').replace(/^ワザ\s*/,'').replace(/"/g,'');
      return `<button class="mvatk" data-idx="${o.index}" data-nm="${nm}">
                <b>${nm}</b> <small style="color:#b8860b;float:right">付与ワザ</small></button>`;
    }).join('');
  let body=mv+grantHtml;
  if(!body && c.text) body=`<div class="mv">${c.text.replace(/\n/g,'<br>')}</div>`;
  if(!body) body='<div class="mrow" style="opacity:.6">テキスト情報なし</div>';
  const info=[]; if(c.evolvesFrom)info.push(`進化前: ${c.evolvesFrom}`);
  if(c.weakness)info.push(`弱点: ${c.weakness}`); if(c.resistance)info.push(`抵抗: ${c.resistance}`);
  if(c.retreat)info.push(`にげる: ${c.retreat}`);
  let actHtml=(actions&&actions.length)
    ?`<div class="acts">${actions.map((a,i)=>`<button data-pi="${i}">${a.label}</button>`).join('')}
       <button class="gray" onclick="closeModal()">戻る</button></div>`
    :`<div class="acts"><button class="gray" onclick="closeModal()">戻る</button></div>`;
  const isTrainer=['ITEM','SUPPORTER','STADIUM','TOOL'].includes(c.cardType);
  const chip = isTrainer ? (c.stage||'トレーナーズ') : `${ICON[t]||'⭐'} ${c.typeJP||t}`;
  const chipCls = isTrainer ? 'c-COLORLESS' : 'c-'+t;
  const stageRow = isTrainer ? '' : `${c.stage||''} ${c.hp?('・HP'+c.hp):''}`;
  const imgHtml=c.img?`<img class="cardimg" src="${c.img}" alt="${c.name}">`:'';
  document.getElementById('modal').innerHTML=`
    <span class="mtype ${chipCls}">${chip}</span>
    <h3>${c.name} ${c.flags?.length?`<small style="color:#b8860b">${c.flags.join(' ')}</small>`:''}</h3>
    ${imgHtml}
    <div class="mrow">${stageRow}　${info.join('　')}</div>
    ${body}
    ${actHtml}`;
  document.querySelectorAll('#modal button[data-pi]').forEach(btn=>{
    btn.onclick=()=>{const a=actions[+btn.dataset.pi];closeModal();
      if(typeof a.onclick==='function'){a.onclick();}else{submit([a.index]);}};});
  document.querySelectorAll('#modal button.mvatk:not([disabled])').forEach(btn=>{
    btn.onclick=()=>confirmAction(`「${btn.dataset.nm}」で攻撃する`,[+btn.dataset.idx]);});
  showModal();
  // 同じゾーン内の隣のカードへ ‹ › / ←→ / スワイプ で遷移
  if(nav&&nav.list&&nav.list.length>1){
    const i=nav.idx, L=nav.list;
    const go=k=>()=>openCard(L[k].cid,L[k].actions,{list:L,idx:k});
    setModalNav(i>0?go(i-1):null, i<L.length-1?go(i+1):null);
  }
}

function bindDnD(){

      if(dragHand==null)return;

      const o=(STATE.select?.options||[]).find(x=>(x.optionType==='ATTACH'||x.optionType==='EVOLVE')
          &&x.srcIndex===dragHand&&x.inPlayArea===area&&x.inPlayIndex===pos);

          ||opts.find(x=>x.optionType==='CARD'&&x.area===HAND&&x.srcIndex===dragHand);
    if(!o){return;}
    const hand=STATE.board.you.hand||[];
    confirmAction(`「${hand[dragHand]?hand[dragHand].name:'カード'}」を場に出す`,[o.index]);
  });
}

/* ---------- イベント逐次再生 ---------- */
let _renderedSeqs=new Set();   // 描画済みイベントの通し番号。ポーリング再取得での二重表示を防ぐ。
function pushLog(ev){
  // seq 付きイベント（サーバ由来）は一度だけ描画する。seq 無し（システム文言）は常に描画。
  if(ev&&ev.seq!=null){ if(_renderedSeqs.has(ev.seq))return; _renderedSeqs.add(ev.seq); }
  const body=document.getElementById('logbody');const d=document.createElement('div');
  d.className='ev '+(ev.who||'sys');d.textContent=ev.text;body.appendChild(d);body.scrollTop=body.scrollHeight;}
function evDelay(ev,total){
  const fast=total>16;
  let base;
  if(/カードを引いた|を引いた/.test(ev.text)) base=fast?120:300;
  else if(ev.who==='opp') base=fast?500:1000;
  else if(ev.who==='sys') base=fast?350:650;
  else base=fast?180:380;
  return Math.max(40, Math.round(base/speedMult));  // 倍速に応じて短縮
}
function playEvents(events,opts){const noLog=opts&&opts.log===false;return new Promise(res=>{
  if(!events||!events.length){res();return;}
  let i=0;
  const tick=()=>{ if(i>=events.length){res();return;} const ev=events[i++];
    if(!noLog)pushLog(ev);   // PvPはログ欄を累積ログ側で冪等再構築するのでアニメ側は描かない
    let d=evDelay(ev, events.length);
    if(ev&&ev.text&&ev.text.indexOf('コイン')===0){ flipCoin(ev.text.indexOf('オモテ')>=0); d=Math.max(d,1600); }
    // 人vs人: カード使用(PLAY)時に、中央へそのカードを約2秒表示する。
    if(ev&&ev.cardId&&STATE&&STATE.mode==='pvp'){ showCardUse(ev.cardId); d=Math.max(d,1500); }
    setTimeout(tick, d); };
  tick();});}

/* きぜつ→トラッシュ 演出：盤面差分(discard増＋ポケモン消失)でKOを検出 */
function _pokeList(side){const out=[];if(side&&side.active&&side.active[0])out.push({area:'active',pos:0,cid:side.active[0].id});
  ((side&&side.bench)||[]).forEach((b,i)=>{if(b)out.push({area:'bench',pos:i,cid:b.id});});return out;}
function detectKOs(oldB,newB){
  const kos=[];if(!oldB||!newB)return kos;
  ['you','opp'].forEach(who=>{const o=oldB[who],n=newB[who];if(!o||!n)return;
    if((n.discard||0)<=(o.discard||0))return;            // トラッシュが増えていなければKOでない（進化/入替を除外）
    const cnt={};_pokeList(n).forEach(p=>cnt[p.cid]=(cnt[p.cid]||0)+1);
    _pokeList(o).forEach(p=>{if((cnt[p.cid]||0)>0)cnt[p.cid]--;else kos.push({who,area:p.area,pos:p.pos,cid:p.cid});});});
  return kos;
}
function markKO(ko){

/* ダメージ演出（人 vs AI のみ）：攻撃ラング＋ダメージ数字＋HPがじわじわ減る */
function _findPoke(board,who,area,pos){const s=board&&board[who];if(!s)return null;return area==='active'?(s.active&&s.active[0]):((s.bench||[])[pos]);}
function _tileEl(who,area,pos,cid){
  const zone=document.getElementById((who==='you'?'you':'opp')+(area==='active'?'Active':'Bench'));
  if(!zone)return null;
  if(area==='active')return zone.querySelector('.pcard');

  return zone.querySelectorAll('.pcard')[pos]||null;

function detectDamage(oldB,newB){
  const out=[];if(!oldB||!newB)return out;
  ['you','opp'].forEach(who=>{
    const positions=[['active',0]]; const ob=oldB[who];
    ((ob&&ob.bench)||[]).forEach((_,i)=>positions.push(['bench',i]));
    positions.forEach(([area,pos])=>{
      const op=_findPoke(oldB,who,area,pos),np=_findPoke(newB,who,area,pos);
      if(op&&np&&op.id===np.id&&typeof op.hp==='number'&&typeof np.hp==='number'&&np.hp<op.hp){
        out.push({who,area,pos,cid:op.id,oldHp:op.hp,newHp:np.hp,maxHp:np.maxHp||op.maxHp});
      }
    });
  });
  return out;
}

function effectToast(events){

function hitFlash(el){if(!el)return;el.classList.add('hitflash');setTimeout(()=>el.classList.remove('hitflash'),500);}
function setHp(el,hp,maxHp){
  const bar=el.querySelector('.hpbar i');if(bar){bar.style.transition='none';bar.style.width=Math.max(0,Math.round(100*hp/maxHp))+'%';}
  const txt=el.querySelector('.ovln span');if(txt)txt.textContent='HP '+Math.max(0,Math.round(hp))+'/'+maxHp;
}
function tweenHp(el,fromHp,toHp,maxHp,ms){
  if(!el)return;ms=ms||650;const t0=performance.now();
  const step=(t)=>{const k=Math.min(1,(t-t0)/ms);const cur=fromHp+(toHp-fromHp)*k;setHp(el,cur,maxHp);if(k<1)requestAnimationFrame(step);};
  requestAnimationFrame(step);
}
function attackerSide(events){for(const e of (events||[])){if(e&&e.text&&e.text.indexOf('のワザ')>=0)return e.who;}return null;}
function lunge(who){const zone=document.getElementById((who==='you'?'you':'opp')+'Active');const el=zone&&zone.querySelector('.pcard');if(!el)return;const cl=who==='you'?'lungeUp':'lungeDown';el.classList.add(cl);setTimeout(()=>el.classList.remove(cl),430);}
function koDmg(events,name){for(const e of (events||[])){if(e&&e.text&&name&&e.text.indexOf('「'+name+'」')>=0){const m=e.text.match(/(\d+)\s*ダメージ/);if(m)return +m[1];}}return 0;}

/* ===== 山札→手札のドロー演出 ===== */
function _handCount(s){if(!s)return 0;return Array.isArray(s.hand)?s.hand.length:(s.handCount||0);}
function _deckRect(who){const side=document.getElementById(who==='you'?'youSide':'oppSide');const el=side&&side.querySelector('.deckStack');return el?el.getBoundingClientRect():null;}
function _handRect(who){const h=document.getElementById(who==='you'?'youHand':'oppHand');return h?h.getBoundingClientRect():null;}
// 山札が減り手札が増えた＝デッキから手札に加わった枚数（通常ドロー/効果ドロー/サーチを問わず）
function detectDraws(oldB,newB){
  const out=[];
  ['you','opp'].forEach(who=>{
    const os=oldB&&oldB[who], nb=newB&&newB[who];
    if(!os||!nb)return;
    const dDeck=(os.deck||0)-(nb.deck||0);
    const dHand=_handCount(nb)-_handCount(os);
    if(dDeck>0&&dHand>0) out.push({who, n:Math.min(dHand,dDeck,8)});  // 複数枚も枚数ぶん飛ばす
  });
  return out;
}
// 裏面カードを山札から手札へ飛ばす（n枚は少しずつ時間差で）
async function animateDraw(who,n){
  const from=_deckRect(who), to=_handRect(who);
  if(!from||!to||n<=0)return;
  const W=44,H=Math.round(W*1.4);
  const sx=from.left+from.width/2-W/2, sy=from.top+from.height/2-H/2;
  for(let i=0;i<n;i++){
    const card=document.createElement('img');
    card.src='/card_back'; card.alt=''; card.className='flyCard';
    card.style.width=W+'px'; card.style.left=sx+'px'; card.style.top=sy+'px';
    document.body.appendChild(card);
    const tx=to.left+Math.min(Math.max(0,to.width-W-8), 10+i*20);
    const ty=to.top+to.height/2-H/2;
    requestAnimationFrame(()=>{card.style.opacity='1';card.style.transform=`translate(${tx-sx}px,${ty-sy}px)`;});
    setTimeout(()=>{card.classList.add('land');setTimeout(()=>card.remove(),300);},480);
    await sleep(95);
  }
}
async function animateDraws(prev,newB){
  const ds=detectDraws(prev,newB);
  if(!ds.length)return;
  await Promise.all(ds.map(d=>animateDraw(d.who,d.n)));
  await sleep(120);
}

/* ===== 開幕マリガン演出（手札→山札に戻して引き直す） ===== */
function _mulliganCount(events,who){
  return (events||[]).filter(e=>e&&e.who===who&&/マリガン|引き直し/.test(e.text||'')).length;
}
// 手札→山札へ裏面カードを飛ばす（animateDraw の逆向き）
async function animateReturnToDeck(who,n){
  const to=_deckRect(who), from=_handRect(who);
  if(!from||!to||n<=0)return;
  const W=44,H=Math.round(W*1.4);
  const tx=to.left+to.width/2-W/2, ty=to.top+to.height/2-H/2;
  for(let i=0;i<n;i++){
    const sx=from.left+Math.min(Math.max(0,from.width-W-8),10+i*20), sy=from.top+from.height/2-H/2;
    const card=document.createElement('img');
    card.src='/card_back';card.alt='';card.className='flyCard';
    card.style.width=W+'px';card.style.left=sx+'px';card.style.top=sy+'px';card.style.opacity='1';
    document.body.appendChild(card);
    requestAnimationFrame(()=>{card.style.opacity='.15';card.style.transform=`translate(${tx-sx}px,${ty-sy}px)`;});
    setTimeout(()=>card.remove(),520);
    await sleep(70);
  }
  await sleep(150);
}
// 開幕: マリガンしたサイドは「初手を配る→(山札へ戻す→引き直す)×回数」を見せる。
// マリガン情報は events の「…引き直し（マリガン）」テキストから検出する。
async function animateOpening(ns){
  if(!ns||!ns.board||ns.status==='waiting'||ns.result!==-1)return;
  const evs=ns.events||[];
  const m={you:_mulliganCount(evs,'you'),opp:_mulliganCount(evs,'opp')};
  if(!m.you&&!m.opp)return;                 // マリガン無し→従来どおり（演出なし）
  STATE=ns;renderBoard();renderBanner();    // 盤面を描画（手札は一旦隠す）
  const hz={you:document.getElementById('youHand'),opp:document.getElementById('oppHand')};
  Object.values(hz).forEach(h=>{if(h)h.style.visibility='hidden';});
  busy=true;
  const n=who=>Math.min(_handCount(ns.board[who])||7,7)||7;
  const reveal=who=>{if(hz[who])hz[who].style.visibility='';};
  async function side(who){
    if(!m[who]){reveal(who);return;}        // マリガン無し側は即表示
    const cyc=Math.min(m[who],2);           // 演出は最大2回（実回数はログ参照）
    await animateDraw(who,n(who));          // 最初の手札を配る
    for(let k=0;k<cyc;k++){
      await sleep(220);
      if(who==='you')showToast(m.you>1?`マリガン×${m.you}：たねポケモンが無いので引き直し`
                                        :'マリガン：たねポケモンが無いので引き直し');
      await animateReturnToDeck(who,n(who)); // 手札→山札へ戻す
      await sleep(160);
      await animateDraw(who,n(who));          // 引き直し
    }
    reveal(who);
  }
  await Promise.all([side('you'),side('opp')]);   // 両サイド並行（実戦の配り直しと同じく同時）
  busy=false;
  STATE=null;   // apply() を「初期描画前」と同じ前提で動かすため戻す
}

/* ===== 場に出す演出（バトル場→ベンチの順） ===== */
function _activeOf(s){const a=s&&s.active;return (a&&a.id)?a:null;}  // active はカードdict or null
function _benchCount(s){return (s&&s.bench)?s.bench.filter(Boolean).length:0;}
function _popActive(who){const z=document.getElementById((who==='you'?'you':'opp')+'Active');const el=z&&z.querySelector('.pcard');if(el){el.classList.remove('placePop');void el.offsetWidth;el.classList.add('placePop');}}
// 1手で「バトル場の新規配置」と「ベンチ増加」を検出し、バトル場→ベンチの順で見せる。
// renderBoard() 済みの前提で、ベンチを一旦隠し→バトル場をポップ→ベンチをポップする。
async function animatePlacements(prev,newB){
  let did=false;
  for(const who of ['you','opp']){
    const os=prev&&prev[who], nb=newB&&newB[who];
    if(!nb)continue;
    const newActive=!_activeOf(os)&&!!_activeOf(nb);
    const benchAdded=_benchCount(nb)-_benchCount(os||{});
    if(newActive&&benchAdded>0){
      // セットアップ等：バトル場を先に見せ、ベンチは後から
      const bench=document.getElementById((who==='you'?'you':'opp')+'Bench');
      if(bench)bench.classList.add('benchReveal');
      _popActive(who); did=true;
      await sleep(560);
      if(bench){
        bench.classList.remove('benchReveal');
        bench.querySelectorAll('.pcard').forEach((el,i)=>{el.style.animationDelay=(i*90)+'ms';el.classList.add('placePop');});
        await sleep(260+benchAdded*90);
      }
    }else if(newActive){
      _popActive(who); did=true; await sleep(140);
    }else if(benchAdded>0){
      const bench=document.getElementById((who==='you'?'you':'opp')+'Bench');
      if(bench)bench.querySelectorAll('.pcard').forEach((el,i)=>{if(i>=_benchCount(os||{})){el.classList.add('placePop');}});
      did=true; await sleep(160);
    }
  }
  return did;
}

async function playAiSteps(ns){
  // AIの行動を1手ずつ（盤面も段階的に）約1秒間隔で再生する
  const ask=document.getElementById('ask');
  ask.classList.remove('hidden');
  ask.innerHTML='<div class="hint">…相手の行動を再生中…</div>';
  document.getElementById('aiControls').classList.add('hidden');
  const sm=(typeof speedMult==='number'&&speedMult>0)?speedMult:1;
  const delay=Math.max(250,Math.round(1000/sm));
  const human=(ns.mode!=='ai');   // ダメージ/HP演出は人の対戦のみ（AI同士は不要）
  for(const st of ns.aiSteps){
    const prev=STATE&&STATE.board;
    // 1) 攻撃ラング（人vsAIのみ）
    const atk=human?attackerSide(st.events):null;
    if(atk){ lunge(atk); await sleep(320); }
    // 2) KO：新盤面前に「きぜつ→トラッシュ」。人vsAIはHPを0までドレイン＋ダメージ数字
    const kos=detectKOs(prev, st.board);
    if(kos.length){
      if(human){
        kos.forEach(ko=>{const el=_tileEl(ko.who,ko.area,ko.pos,ko.cid),op=_findPoke(prev,ko.who,ko.area,ko.pos);
          if(el&&op){dmgCallout(el,koDmg(st.events,op.name)||op.hp);hitFlash(el);tweenHp(el,op.hp,0,op.maxHp||op.hp,450);}});
        await sleep(520);
      }
      kos.forEach(markKO); await sleep(human?820:950);
    }
    // 3) ダメージ（生存ポケモン）：新盤面を描いてから旧HPに戻し→じわじわ減らす
    const dmgs=human?detectDamage(prev, st.board):[];
    STATE=Object.assign({},ns,{board:st.board,select:null,result:-1});
    renderBoard();
    // 2.5) 場に出す演出（バトル場→ベンチの順）＋山札→手札のドロー演出
    await animatePlacements(prev, st.board);
    await animateDraws(prev, st.board);
    if(dmgs.length){
      // 「Nダメージ！」を大きく出し、しっかり読める“間”を置いてからHPをじわじわ減らす
      dmgs.forEach(d=>{const el=_tileEl(d.who,d.area,d.pos,d.cid);if(el){setHp(el,d.oldHp,d.maxHp);dmgCallout(el,d.oldHp-d.newHp);hitFlash(el);}});
      await sleep(620);
      dmgs.forEach(d=>{const el=_tileEl(d.who,d.area,d.pos,d.cid);if(el)tweenHp(el,d.oldHp,d.newHp,d.maxHp,700);});
      await sleep(820);
    }
    // 4) 効果/特性/入れ替えを告知（中央トースト＋バトル場ポケモンを強調）
    const sws=detectSwitches(prev, st.board);
    sws.forEach(s=>highlightActive(s.who));
    const tt=effectToast(st.events);
    if(tt) showToast(tt);
    if(sws.length || (tt&&tt.indexOf('入れ替え')>=0)) await sleep(700);   // 入れ替えは“間”を置いて気づけるように
    // 5) ログ＋コイントス演出
    (st.events||[]).forEach(pushLog);
    if(hasCoin(st.events)) await animateCoins(st.events);
    await sleep(delay);
  }
}
async function apply(ns,playback){
  const steps=(playback && ns.mode!=='ai' && ns.aiSteps && ns.aiSteps.length)?ns.aiSteps:null;
  const prevBoard=STATE&&STATE.board;        // この適用前に表示していた盤面
  if(steps){busy=true;await playAiSteps(ns);busy=false;}
  const beforeFinal=(STATE&&STATE.board)||prevBoard;  // 最終盤面の直前（aiStepsがあれば最後の手番盤面）
  STATE=ns; renderBoard(); renderBanner();
  // 人の対戦：最終盤面で「自分の場出し（バトル場→ベンチ順）」「自分のドロー」を演出する
  if(playback && ns.mode!=='ai' && ns.board){
    busy=true;
    await animatePlacements(beforeFinal, ns.board);
    await animateDraws(beforeFinal, ns.board);
    busy=false;
  }
  if(STATE.mode==='ai'){
    document.getElementById('ask').classList.add('hidden');
    if(playback&&!steps){busy=true;await playEvents(ns.events);busy=false;}
    renderAiControls();
    return;
  }
  document.getElementById('aiControls').classList.add('hidden');
  document.getElementById('ask').classList.remove('hidden');
  if(playback&&!steps){
    document.getElementById('ask').innerHTML=(ns.events&&ns.events.length)?'<div class="hint">…経過を再生中…</div>':'';
    busy=true;await playEvents(ns.events);busy=false;
  }
  renderAsk();
}
async function submit(p){closeModal();busy=true;
  document.getElementById('ask').innerHTML='<div class="hint">処理中…</div>';
  const ns=await post('/api/select',{gid:GID,token:TOKEN,picks:p});
  if(STATE&&STATE.mode==='pvp'){await applyPvp(ns);busy=false;return;}
  await apply(ns,true);}

/* ---------- 人 vs 人（オンライン） ---------- */
function shareUrl(){return location.origin+'/join?gid='+encodeURIComponent(GID);}
function renderWaiting(ns){
  document.getElementById('aiControls').classList.add('hidden');
  const ask=document.getElementById('ask');ask.classList.remove('hidden');
  ask.innerHTML=`<h2>相手の参加を待っています…</h2>
    <div class="hint">下のURLを相手に共有してください。相手が参加すると自動で対戦が始まります。</div>
    <input readonly value="${shareUrl()}" style="width:100%;padding:9px;border:1px solid var(--line);border-radius:10px" onclick="this.select()">
    <div style="margin-top:8px"><button type="button" id="copyUrl">URLをコピー</button></div>`;
  const b=document.getElementById('copyUrl');
  if(b)b.onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(shareUrl());b.textContent='コピーしました';};
}
function schedulePvpPoll(ms){
  // 二重起動を避けて次のポーリングを予約する。
  if(pvpTimer)clearTimeout(pvpTimer);
  pvpTimer=setTimeout(pvpPoll, ms||600);   // 既定600ms。相手着手の反映遅延を短縮（旧1200ms）
}
async function applyPvp(ns){
  if(ns&&ns.status==='waiting'){STATE=ns;renderWaiting(ns);schedulePvpPoll(1500);return;}
  const prevBoard=STATE&&STATE.board;
  STATE=ns;renderBoard();renderBanner();
  // 場出し（バトル場→ベンチ順）＋ドロー演出（ver変化時に1回だけ）
  if(ns.ver!==lastVer && ns.board){
    busy=true; await animatePlacements(prevBoard, ns.board); await animateDraws(prevBoard, ns.board); busy=false;
  }
  document.getElementById('aiControls').classList.add('hidden');
  const ask=document.getElementById('ask');ask.classList.remove('hidden');
  // ログ欄は累積ログ(seq)で冪等に再構築（取りこぼし無し・二重表示無し）
  (ns.log||[]).forEach(pushLog);
  // アニメーション（コイン/カード使用/ダメージ）は最新差分のみ、ver変化時に1回だけ
  if(ns.ver!==lastVer && ns.events && ns.events.length){
    lastVer=ns.ver;busy=true;await playEvents(ns.events,{log:false});busy=false;
  }else{lastVer=ns.ver;}
  if(ns.result!==-1){ask.innerHTML='';if(pvpTimer){clearTimeout(pvpTimer);pvpTimer=null;}return;}
  if(ns.yourTurn){renderAsk();}                    // 自分の手番＝入力待ち（ポーリング停止）
  else{ask.innerHTML='<div class="hint">相手の番です。お待ちください…</div>';schedulePvpPoll();}  // 相手の手を検知し続ける
}
async function pvpPoll(){
  pvpTimer=null;
  if(STATE&&STATE.result!==-1)return;
  let ns; try{ns=await get('/api/state'+qs());}catch(e){schedulePvpPoll(1500);return;}
  if(ns.status==='waiting'){renderWaiting(ns);schedulePvpPoll(1500);return;}
  if(!ns.board){schedulePvpPoll(1500);return;}
  await applyPvp(ns);   // 次のポーリング要否は applyPvp が判断・予約する
}

/* ---------- AI vs AI 観戦コントロール ---------- */
function renderAiControls(){
  const box=document.getElementById('aiControls');
  box.classList.remove('hidden');
  if(STATE.result!==-1){box.innerHTML='<div class="aiDone">対戦終了</div>';return;}
  const btns=[1,2,3,5,10].map(m=>`<button class="spd${speedMult===m?' on':''}" data-m="${m}">${m}倍速</button>`).join('');
  box.innerHTML=`
    <button id="aiPlayPause">${aiPlaying?'⏸ 一時停止':'▶ 再生'}</button>
    <span class="speed">速度: ${btns}</span>`;
  document.getElementById('aiPlayPause').onclick=toggleAiPlay;
  box.querySelectorAll('button.spd').forEach(b=>b.onclick=()=>{speedMult=+b.dataset.m;renderAiControls();});
}
function toggleAiPlay(){
  aiPlaying=!aiPlaying;
  renderAiControls();
  if(aiPlaying)aiLoop();
  else if(aiTimer){clearTimeout(aiTimer);aiTimer=null;}
}
async function aiLoop(){
  if(!aiPlaying||!STATE||STATE.result!==-1){aiPlaying=false;renderAiControls();return;}
  const ns=await post('/api/step',{gid:GID,token:TOKEN});
  if(ns.error){aiPlaying=false;pushLog({who:'sys',text:'エラー: '+ns.error});renderAiControls();return;}
  await apply(ns,true);
  if(aiPlaying&&STATE.result===-1) aiTimer=setTimeout(aiLoop, Math.max(60, aiDelay/speedMult));
  else{aiPlaying=false;renderAiControls();}
}

function showNoGame(){
  document.getElementById('playmat').classList.add('hidden');
  document.querySelector('.handzone').classList.add('hidden');
  const ng=document.getElementById('noGame');
  ng.classList.remove('hidden');
  ng.innerHTML='対戦がまだ開始されていません。<br><a href="/play">対戦メニュー</a>から対戦を始めてください。';
}

/* ---------- AI vs AI: 裏で最後まで実行し、リプレイ画面で結果を見る ---------- */
async function runAiToReplay(st){
  document.getElementById('playmat').classList.add('hidden');
  document.querySelector('.handzone').classList.add('hidden');
  const ng=document.getElementById('noGame');
  ng.classList.remove('hidden');
  const label=`${st.youLabel||'AI 1'}<br>vs ${st.oppLabel||'AI 2'}`;
  const draw=t=>{ng.innerHTML=
    `<div style="text-align:center;padding:28px 12px;">
       <h2 style="margin:0 0 10px;">AI対戦を実行中…</h2>
       <div style="font-weight:800;margin-bottom:10px;">${label}</div>
       <div>ターン ${t??'-'}</div>
       <div style="color:var(--sub);font-size:12px;margin-top:10px;">終了すると自動でリプレイ画面が開きます。</div>
     </div>`;};
  draw(st.board?st.board.turn:null);
  for(;;){
    let r;
    try{r=await post('/api/run',{gid:GID});}
    catch(e){ng.innerHTML='通信エラーが発生しました: '+(e.message||e);return;}
    if(r.error){ng.innerHTML='エラー: '+r.error;return;}
    if(r.done){
      if(r.log_file){location.href='/replay?log='+encodeURIComponent(r.log_file);}
      else{ng.innerHTML='対戦は終了しましたが、ログの保存に失敗しました。<br><a href="/replay">対戦ログ一覧</a>から確認してください。';}
      return;
    }
    draw(r.turn);
  }
}

/* ---------- 初期化 ---------- */
(async ()=>{
  if(!GID){showNoGame();return;}
  const st=await get('/api/state'+qs());
  // 人 vs 人（オンライン）
  if(st.mode==='pvp'){
    document.getElementById('logbody').innerHTML='';
    if(st.status==='waiting'){renderWaiting(st);schedulePvpPoll(1500);return;}
    pushLog({who:'sys',text:'―― 対戦開始 ――'});
    await applyPvp(st);   // 相手の手番なら applyPvp がポーリングを開始する
    return;
  }
  if(!st||!st.board){showNoGame();return;}
  // AI vs AI: リアルタイム観戦せず、裏で完走→リプレイ画面へ
  if(st.mode==='ai'){runAiToReplay(st);return;}
  document.getElementById('logbody').innerHTML='';
  pushLog({who:'sys',text:'―― 対戦開始 ――'});
  await animateOpening(st);   // マリガンがあれば「手札→山札→引き直し」を演出
  await apply(st,true);
})();
</script>
