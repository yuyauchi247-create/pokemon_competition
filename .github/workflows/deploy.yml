name: Deploy to Lightsail

# main へ push されたら VPS へ自動デプロイする。
# 手動実行(Actions タブの Run workflow)も可能。
on:
  push:
    branches: [main]
  workflow_dispatch:

# デプロイが重ならないよう直列化（前のデプロイ完了を待つ）
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: SSH 鍵を準備
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts

      # コードのみ同期。data/(card_images・CSV・libcg.so・ユーザーデータ)は
      # VPS 側に常駐させ、ここでは触れない(--exclude data)。
      # --delete は不要になったコードファイルを VPS からも消すため。
      - name: コードを rsync 同期
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            --exclude='.git' \
            --exclude='data' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='node_modules' \
            --exclude='.playwright-mcp' \
            ./ "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/opt/pokeca/"

      - name: 再ビルド & 再起動
        run: |
          ssh -i ~/.ssh/id_deploy "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" \
            'cd /opt/pokeca && docker compose -f compose.prod.yaml up -d --build && docker image prune -f'
